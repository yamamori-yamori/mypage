<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小説テキスト比較ツール novdiff</title>
<style>
  :root {
    --deleted-bg: #ffebee;
    --deleted-text: #c62828;
    --added-bg: #c8e6c9;
    --added-text: #1b5e20;
    --changed-bg: #fff8e1;
    --changed-text: #f9a825;
    --toolbar-h: 48px;
    --header-h: 28px;
    --minimap-w: 52px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
    background: #f5f5f5;
    overflow: hidden;
  }
  #toolbar {
    height: var(--toolbar-h);
    background: #263238;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    flex-shrink: 0;
  }
  #toolbar .app-title {
    font-size: 12px;
    font-weight: 600;
    color: #cfd8dc;
    letter-spacing: 0.02em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #toolbar .app-title .app-name {
    color: #eceff1;
    font-weight: 700;
  }
  #toolbar .toolbar-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
    min-width: 0;
  }
  #toolbar .app-meta {
    margin-left: auto;
    font-size: 11px;
    color: #90a4ae;
    white-space: nowrap;
    flex-shrink: 0;
    text-align: right;
    line-height: 1.35;
  }
  #toolbar .app-meta .ver {
    color: #b0bec5;
  }
  #toolbar .app-meta a.credit {
    color: #90a4ae;
    text-decoration: none;
  }
  #toolbar .app-meta a.credit:hover {
    color: #cfd8dc;
    text-decoration: underline;
  }
  #toolbar button {
    background: #455a64;
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  #toolbar button:hover { background: #546e7a; }
  #toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
  #toolbar button.primary { background: #2e7d32; }
  #toolbar button.primary:hover { background: #388e3c; }
  #toolbar button.nav-diff {
    padding: 6px 10px;
    min-width: 36px;
    font-size: 14px;
    line-height: 1;
  }
  #toolbar .nav-diff-group {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }
  .seg.diff-jump-flash {
    outline: 2px solid #ff9800;
    outline-offset: 1px;
    border-radius: 2px;
  }
  #toolbar label { font-size: 13px; display: flex; align-items: center; gap: 6px; }
  #toolbar input[type="number"], #toolbar select {
    width: 64px;
    padding: 4px 6px;
    border-radius: 3px;
    border: 1px solid #546e7a;
    background: #37474f;
    color: #fff;
    font-size: 13px;
  }
  #main {
    display: grid;
    grid-template-columns: var(--minimap-w) 1fr 1fr;
    height: calc(100% - var(--toolbar-h));
    position: relative;
  }
  #minimap-wrap {
    background: #eceff1;
    border-right: 1px solid #b0bec5;
    position: relative;
    overflow: hidden;
  }
  #minimap {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
    touch-action: none;
  }
  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #fff;
    border-right: 1px solid #cfd8dc;
    position: relative;
  }
  .panel-header {
    height: var(--header-h);
    background: #eceff1;
    border-bottom: 1px solid #cfd8dc;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    font-size: 12px;
    color: #546e7a;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    gap: 8px;
  }
  .panel-header .fname {
    color: #263238;
    font-weight: 600;
    margin-left: 4px;
  }
  .panel-header button {
    background: #2e7d32;
    color: #fff;
    border: none;
    padding: 3px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    flex-shrink: 0;
  }
  .panel-header button:hover { background: #388e3c; }
  .panel-header button:disabled { opacity: 0.5; cursor: not-allowed; }
  .panel-body {
    flex: 1;
    overflow: auto;
    position: relative;
  }
  .panel-inner {
    padding: 12px 16px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-wrap: anywhere;
    min-height: 100%;
    outline: none;
  }
  #old-inner {
    user-select: text;
    cursor: default;
  }
  .panel-inner:empty::before {
    content: attr(data-placeholder);
    color: #90a4ae;
    pointer-events: none;
  }
  .del { background: var(--deleted-bg); color: var(--deleted-text); }
  .add { background: var(--added-bg); color: var(--added-text); }
  .chg { background: var(--changed-bg); color: var(--changed-text); }
  /* Alignment segment: body = real text, fill = fake spacer (gray box). */
  .seg {
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }
  .seg-body {
    display: block;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-wrap: anywhere;
    flex: 0 0 auto;
  }
  /* Artificial alignment space — subtle solid fill (not a real newline) */
  .seg-fill {
    flex: 1 1 auto;
    min-height: 0;
    margin: 0;
    border-radius: 2px;
    border: none;
    background: #eceff1;
    opacity: 1;
    pointer-events: none;
    user-select: none;
    box-sizing: border-box;
  }
  /* Pure gap hunk (no text on this side): fill is the whole segment */
  .seg.gap {
    min-height: 0;
  }
  .seg.gap > .seg-fill {
    flex: 1 1 auto;
    margin: 0;
  }
  /* Trailing pad so left/right scrollHeight match (prevents mid-doc scroll drift) */
  .scroll-eq {
    display: block;
    margin: 0;
    padding: 0;
    border: 0;
    pointer-events: none;
    user-select: none;
  }
  #drop-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(38,50,56,0.7);
    color: #fff;
    font-size: 18px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }
  .panel.drag-over #drop-hint { opacity: 1; }
  /* Same-content banner (center of viewport over both panels) */
  #same-banner {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    display: none;
    align-items: center;
    justify-content: center;
    grid-column: 1 / -1;
    grid-row: 1 / -1;
  }
  #same-banner.visible { display: flex; }
  #same-banner span {
    padding: 14px 28px;
    border-radius: 8px;
    background: rgba(38, 50, 56, 0.82);
    color: #eceff1;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.06em;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div id="toolbar">
    <div class="app-title">小説テキスト比較ツール <span class="app-name">novdiff</span></div>
    <div class="toolbar-controls">
      <label>文字サイズ
        <select id="font-size">
          <option value="12">12</option>
          <option value="14" selected>14</option>
          <option value="16">16</option>
          <option value="18">18</option>
          <option value="20">20</option>
          <option value="22">22</option>
          <option value="24">24</option>
        </select>
      </label>
      <label>表示幅
        <input type="number" id="char-width" value="40" min="10" max="120">
        文字
      </label>
      <span class="nav-diff-group" title="差分箇所へ移動">
        <button type="button" id="btn-prev-diff" class="nav-diff" aria-label="前の差分へ">▲</button>
        <button type="button" id="btn-next-diff" class="nav-diff" aria-label="次の差分へ">▼</button>
      </span>
      <button id="btn-save">保存</button>
    </div>
    <div class="app-meta">
      <span class="ver">v1.1</span>
      · <a class="credit" href="https://yamamori-yamori.github.io/mypage/" target="_blank" rel="noopener noreferrer">by やまもりやもり</a>
    </div>
  </div>

  <div id="main">
    <div id="minimap-wrap">
      <canvas id="minimap"></canvas>
    </div>
    <div class="panel" id="panel-old">
      <div class="panel-header">
        <span>古いテキスト: <span class="fname" id="old-fname">（未設定）</span></span>
      </div>
      <div class="panel-body" id="old-body">
        <div class="panel-inner" id="old-inner" data-placeholder="ここに古いテキストをドロップ（または貼り付け）"></div>
        <div id="drop-hint">古いテキストをドロップ</div>
      </div>
    </div>
    <div class="panel" id="panel-new">
      <div class="panel-header">
        <span>新しいテキスト: <span class="fname" id="new-fname">（未設定）</span></span>
      </div>
      <div class="panel-body" id="new-body">
        <div class="panel-inner" id="new-inner" contenteditable="true" data-placeholder="ここに新しいテキストをドロップ（または貼り付け）"></div>
        <div id="drop-hint">新しいテキストをドロップ</div>
      </div>
    </div>
    <div id="same-banner" aria-live="polite"><span>内容は同じ</span></div>
  </div>

      (code >= 0xff00 && code <= 0xff60) ||
      (code >= 0xffe0 && code <= 0xffe6) ||
      (code >= 0x1f300 && code <= 0x1f9ff)
    ) return 1;
    return 0.5;
  }

  function lineDisplayWidth(line) {
    let w = 0;
    for (const ch of line) w += charDisplayWidth(ch);
    return w;
  }

  /**
   * Estimate visual line count under pre-wrap + break-all + fixed char width.
   * Used only as initial min-height; refinePairHeights() corrects with DOM.
   */
  function countVisualLines(text, widthChars) {
    if (!text) return 0;
    const W = Math.max(1, widthChars || getWidthChars());
    const parts = text.split("\n");
    let total = 0;
    for (let i = 0; i < parts.length; i++) {
      const seg = parts[i];
      const isLast = i === parts.length - 1;
      if (seg.length === 0) {
        // Trailing empty from final \n: terminator, not an extra blank line.
        // "a\n\n".split => middle "" is a blank line; last is terminator.
        if (isLast) continue;
        total += 1;
        continue;
      }
      const dw = lineDisplayWidth(seg);
      total += Math.max(1, Math.ceil(dw / W));
    }
    return total;
  }

  function emForText(text, widthChars) {
    const n = Math.min(Math.max(countVisualLines(text, widthChars), 0), 400);
    if (n <= 0) return 0;
    return n * 1.75;
  }

  /** Read plain text: drop spacers; use textContent to avoid block-induced extra newlines. */
  function readPlain(el) {
    if (!el) return "";
    if (!el.querySelector || !el.querySelector(".gap, .seg, .seg-fill, span.del, span.add, span.chg")) {
      return normalize(el.innerText || el.textContent || "");
    }
    const clone = el.cloneNode(true);
    clone.querySelectorAll(".gap, .seg-fill").forEach(g => g.remove());
    return normalize(clone.textContent || "");
  }

  /** Char-level highlight for a single change pair (no alignment gaps). */
  function buildCharSides(delTx, addTx) {
    let o = "", n = "";
    if (!delTx && !addTx) return { o, n };
    const diffs = dmp.diff_main(delTx || "", addTx || "");
    dmp.diff_cleanupSemantic(diffs);
    for (let i = 0; i < diffs.length; i++) {
      const op = diffs[i][0];
      const tx = diffs[i][1];
      if (!tx) continue;
      if (op === 0) {
        const e = escapeHtml(tx);
        o += e; n += e;
      } else if (op === -1) {
        o += '<span class="del">' + escapeHtml(tx) + "</span>";
      } else if (op === 1) {
        const prev = i > 0 ? diffs[i - 1][0] : null;
        const cls = prev === -1 ? "chg" : "add";
        n += '<span class="' + cls + '">' + escapeHtml(tx) + "</span>";
      }
    }
    return { o, n };
  }

  const FILL = '<span class="seg-fill" aria-hidden="true"></span>';

  /** Content segment with trailing gray fill (fill grows when min-height > body). */
  function segHtml(hid, bodyHtml, minEm) {
    const style = minEm > 0 ? ' style="min-height:' + minEm.toFixed(2) + 'em"' : "";
    return '<span class="seg" data-hid="' + hid + '"' + style + ">" +
      '<span class="seg-body">' + bodyHtml + "</span>" + FILL + "</span>";
  }

  /** Pure spacer segment (no real text on this side). */
  function gapHtml(hid, minEm) {
    const style = minEm > 0
      ? ' style="min-height:' + minEm.toFixed(2) + "em;height:" + minEm.toFixed(2) + 'em"'
      : "";
    return '<span class="seg gap" data-hid="' + hid + '" aria-hidden="true"' + style + ">" +
      FILL + "</span>";
  }

  /** Split text into lines, keeping trailing \\n on each line (except final line without \\n). */
  function splitLinesKeep(text) {
    if (!text) return [];
    const parts = text.split("\n");
    const lines = [];
    for (let i = 0; i < parts.length; i++) {
      if (i < parts.length - 1) lines.push(parts[i] + "\n");
      else if (parts[i].length > 0) lines.push(parts[i]);
    }
    return lines;
  }

  /**
   * Similarity of two lines in [0,1] via equal-char ratio from char diff.
   * Used to pair "mostly the same" rewritten lines for vertical alignment.
   */
  function lineSimilarity(a, b) {
    if (a === b) return 1;
    if (!a || !b) return 0;
    const aa = a.endsWith("\n") ? a.slice(0, -1) : a;
    const bb = b.endsWith("\n") ? b.slice(0, -1) : b;
    if (aa === bb) return 1;
    if (!aa.length && !bb.length) return 1;
    const diffs = dmp.diff_main(aa, bb);
    let eq = 0;
    for (let i = 0; i < diffs.length; i++) {
      if (diffs[i][0] === 0) eq += diffs[i][1].length;
    }
    return eq / Math.max(aa.length, bb.length, 1);
  }

  /**
   * Align two multi-line change blocks line-by-line using similarity.
   * Returns [{left, right}, ...] where missing side is null.
   */
  function alignChangedLines(delTx, addTx) {
    const A = splitLinesKeep(delTx);
    const B = splitLinesKeep(addTx);
    const n = A.length;
    const m = B.length;
    if (!n && !m) return [];
    if (!n) return B.map(r => ({ left: null, right: r }));
    if (!m) return A.map(l => ({ left: l, right: null }));

    // "大体同じ" lines pair as one row (char-diff inside).
    // Novel rewrites often keep ~35–50% of a line; 0.35 catches those.
    const THRESH = 0.35;

    const dp = new Array(n + 1);
    const bt = new Array(n + 1);
    for (let i = 0; i <= n; i++) {
      dp[i] = new Float64Array(m + 1);
      bt[i] = new Int8Array(m + 1);
    }
    for (let i = 1; i <= n; i++) bt[i][0] = 1;
    for (let j = 1; j <= m; j++) bt[0][j] = 2;

    for (let i = 1; i <= n; i++) {
      for (let j = 1; j <= m; j++) {
        const sim = lineSimilarity(A[i - 1], B[j - 1]);
        const up = dp[i - 1][j];
        const left = dp[i][j - 1];
        if (sim >= THRESH) {
          const diag = dp[i - 1][j - 1] + sim;
          if (diag >= up && diag >= left) {
            dp[i][j] = diag;
            bt[i][j] = 0;
            continue;
          }
        }
        if (up >= left) {
          dp[i][j] = up;
          bt[i][j] = 1;
        } else {
          dp[i][j] = left;
          bt[i][j] = 2;
        }
      }
    }

    const pairs = [];
    let i = n, j = m;
    while (i > 0 || j > 0) {
      if (i > 0 && j > 0 && bt[i][j] === 0) {
        pairs.push({ left: A[i - 1], right: B[j - 1] });
        i--; j--;
      } else if (i > 0 && (j === 0 || bt[i][j] === 1)) {
        pairs.push({ left: A[i - 1], right: null });
        i--;
      } else {
        pairs.push({ left: null, right: B[j - 1] });
        j--;
      }
    }
    pairs.reverse();
    return pairs;
  }

  /** Emit one aligned row (pair of segs). */
  function emitAlignedRow(pair, widthChars, acc) {
    const id = acc.hid++;
    const L = pair.left;
    const R = pair.right;
    if (L != null && R != null) {
      const minEm = Math.max(emForText(L, widthChars), emForText(R, widthChars));
      const sides = buildCharSides(L, R);
      acc.o += segHtml(id, sides.o, minEm);
      acc.n += segHtml(id, sides.n, minEm);
    } else if (L != null) {
      const minEm = emForText(L, widthChars);
      acc.o += segHtml(id, '<span class="del">' + escapeHtml(L) + "</span>", minEm);
      acc.n += gapHtml(id, minEm);
    } else if (R != null) {
      const minEm = emForText(R, widthChars);
      acc.o += gapHtml(id, minEm);
      acc.n += segHtml(id, '<span class="add">' + escapeHtml(R) + "</span>", minEm);
    }
  }

  /**
   * Build HTML from LINE-level diffs.
   * Change hunks are split into similar-line rows so nearly-identical lines line up.
   * Extra vertical space is always .seg-fill (gray box).
   */
  function buildHtml(lineDiffs) {
    const widthChars = getWidthChars();
    const acc = { o: "", n: "", hid: 0 };

    for (let i = 0; i < lineDiffs.length; i++) {
      const op = lineDiffs[i][0];
      const tx = lineDiffs[i][1];
      if (!tx) continue;

      if (op === 0) {
        const id = acc.hid++;
        const html = escapeHtml(tx);
        acc.o += segHtml(id, html, 0);
        acc.n += segHtml(id, html, 0);
        continue;
      }

      if (op === -1) {
        const next = lineDiffs[i + 1];
        if (next && next[0] === 1 && next[1]) {
          const rows = alignChangedLines(tx, next[1]);
          for (let r = 0; r < rows.length; r++) {
            emitAlignedRow(rows[r], widthChars, acc);
          }
          i++;
        } else {
          const lines = splitLinesKeep(tx);
          if (!lines.length) emitAlignedRow({ left: tx, right: null }, widthChars, acc);
          else {
            for (let k = 0; k < lines.length; k++) {
              emitAlignedRow({ left: lines[k], right: null }, widthChars, acc);
            }
          }
        }
        continue;
      }

      if (op === 1) {
        const lines = splitLinesKeep(tx);
        if (!lines.length) emitAlignedRow({ left: null, right: tx }, widthChars, acc);
        else {
          for (let k = 0; k < lines.length; k++) {
            emitAlignedRow({ left: null, right: lines[k] }, widthChars, acc);
          }
        }
      }
    }
    return { o: acc.o, n: acc.n };
  }

  /** After paint: force each data-hid pair to the same pixel height (gray fill absorbs slack). */
  function refinePairHeights() {
    // Drop previous total-height equalizer
    oldInner.querySelectorAll(":scope > .scroll-eq").forEach(e => e.remove());
    newInner.querySelectorAll(":scope > .scroll-eq").forEach(e => e.remove());

    const pairs = new Map();
    oldInner.querySelectorAll(":scope > [data-hid]").forEach(el => {
      pairs.set(el.getAttribute("data-hid"), { L: el, R: null });
    });
    newInner.querySelectorAll(":scope > [data-hid]").forEach(el => {
      const id = el.getAttribute("data-hid");
      const p = pairs.get(id);
      if (p) p.R = el;
      else pairs.set(id, { L: null, R: el });
    });

    function naturalHeight(el) {
      if (!el) return 0;
      if (el.classList.contains("gap")) return 0;
      const body = el.querySelector(":scope > .seg-body");
      if (body) {
        // getBoundingClientRect is subpixel-accurate for wrap height
        const h = body.getBoundingClientRect().height;
        return h > 0 ? h : body.scrollHeight;
      }
      return el.scrollHeight;
    }

    // Measure natural body heights (ignore previous min-height / fill)
    pairs.forEach(({ L, R }) => {
      [L, R].forEach(el => {
        if (!el) return;
        el.style.minHeight = "0px";
        el.style.height = "";
        el.style.maxHeight = "";
        const fill = el.querySelector(":scope > .seg-fill");
        if (fill) {
          fill.style.display = "none";
          fill.style.minHeight = "0";
          fill.style.height = "";
        }
      });
    });
    void oldInner.offsetHeight;

    const natural = new Map();
    pairs.forEach((p, id) => {
      const hL = naturalHeight(p.L);
      const hR = naturalHeight(p.R);
      // ceil to whole device pixels to avoid 0.5px drift stacking
      const target = Math.ceil(Math.max(hL, hR));
      natural.set(id, { hL, hR, target });
    });

    pairs.forEach((p, id) => {
      const { hL, hR, target } = natural.get(id);
      if (target <= 0) return;
      const px = target + "px";

      function apply(el, naturalH) {
        if (!el) return;
        // Lock both sides to the exact same box height
        el.style.boxSizing = "border-box";
        el.style.minHeight = px;
        el.style.height = px;
        const fill = el.querySelector(":scope > .seg-fill");
        if (!fill) return;
        const slack = target - naturalH;
        if (slack > 0.5) {
          fill.style.display = "block";
          fill.style.flex = "1 1 auto";
          fill.style.minHeight = Math.max(0, slack) + "px";
          fill.style.height = "";
          fill.title = "位置揃え用の余白（本文の改行ではありません）";
        } else {
          fill.style.display = "none";
          fill.style.minHeight = "0";
          fill.style.height = "0";
        }
      }

      apply(p.L, hL);
      apply(p.R, hR);
    });

    // Final: make total content heights identical (kills mid-document ratio drift)
    void oldInner.offsetHeight;
    const totL = oldInner.scrollHeight;
    const totR = newInner.scrollHeight;
    const diff = totL - totR;
    if (Math.abs(diff) >= 0.5) {
      const pad = document.createElement("span");
      pad.className = "scroll-eq";
      pad.style.height = Math.abs(diff) + "px";
      pad.setAttribute("aria-hidden", "true");
      if (diff > 0) newInner.appendChild(pad);
      else oldInner.appendChild(pad);
    }
  }

  function render(diffs) {
    lastDiffs = diffs;
    // Prefer exact pre-focus scroll (both edit and no-edit). Caret only for fine nudge.
    const snap = pendingScrollSnapshot;
    pendingScrollSnapshot = null;
    const caretN = pendingRestoreAnchor;
    pendingRestoreAnchor = null;
    const fallbackN = (!snap && !caretN) ? getTextAnchor(newBody, newInner) : null;
    const anchorO = getTextAnchor(oldBody, oldInner);
    const { o, n } = buildHtml(diffs);

    oldInner.innerHTML = o;
    newInner.innerHTML = n;
    newInner.contentEditable = "true";
    isPlainEditing = false;
    highlightsCleared = false;
    updateSameBanner();

    requestAnimationFrame(() => {
      refinePairHeights();
      isSyncing = true;
      applyReturnScroll(snap, caretN, fallbackN, anchorO);
      requestAnimationFrame(() => {
        // Second pass after layout settles (gap heights etc.)
        applyReturnScroll(snap, caretN, fallbackN, anchorO);
        isSyncing = false;
        drawMinimap();
        if (pendingJumpDir) {
          const d = pendingJumpDir;
          pendingJumpDir = 0;
          jumpToDiff(d, true);
        }
      });
    });
  }

  /** Ordered change segment ids (hunk rows with del/add/chg or gap). */
  function collectChangeHids() {
    const ids = [];
    const seen = new Set();
    const segs = oldInner.querySelectorAll(":scope > .seg[data-hid]");
    for (let i = 0; i < segs.length; i++) {
      const seg = segs[i];
      const id = seg.getAttribute("data-hid");
      if (!id || seen.has(id)) continue;
      const other = newInner.querySelector(':scope > .seg[data-hid="' + id + '"]');
      const isChange =
        seg.classList.contains("gap") ||
        (other && other.classList.contains("gap")) ||
        !!seg.querySelector(".del, .add, .chg") ||
        !!(other && other.querySelector(".del, .add, .chg"));
      if (isChange) {
        seen.add(id);
        ids.push(id);
      }
    }
    // hids only on new side (defensive)
    newInner.querySelectorAll(":scope > .seg[data-hid]").forEach(seg => {
      const id = seg.getAttribute("data-hid");
      if (!id || seen.has(id)) return;
      if (
        seg.classList.contains("gap") ||
        seg.querySelector(".del, .add, .chg")
      ) {
        seen.add(id);
        ids.push(id);
      }
    });
    return ids;
  }

  function flashDiffSeg(el) {
    if (!el) return;
    el.classList.remove("diff-jump-flash");
    void el.offsetWidth;
    el.classList.add("diff-jump-flash");
    clearTimeout(el._flashTimer);
    el._flashTimer = setTimeout(() => {
      el.classList.remove("diff-jump-flash");
    }, 900);
  }

  /**
   * Scroll both panes so the change row is near the top of the viewport.
   * dir: -1 previous, +1 next. Wraps at ends.
   * fromPending: skip edit-mode defer (already restored).
   */
  function jumpToDiff(dir, fromPending) {
    if (!dir) return;
    if (!lastDiffs || isDiffing) return;

    // Need highlighted DOM; if editing, leave pane then jump after restore/doDiff
    if (!fromPending && (isPlainEditing || highlightsCleared)) {
      pendingJumpDir = dir;
      if (document.activeElement === newInner || newInner.contains(document.activeElement)) {
        newInner.blur();
      } else if (isDirty) {
        doDiff();
      } else if (highlightsCleared && lastDiffs) {
        pendingScrollSnapshot = scrollSnapshotBeforeFocus
          ? {
              new: scrollSnapshotBeforeFocus.new,
              old: scrollSnapshotBeforeFocus.old,
              newHeight: scrollSnapshotBeforeFocus.newHeight,
              oldHeight: scrollSnapshotBeforeFocus.oldHeight,
              topOffset: scrollSnapshotBeforeFocus.topOffset,
              newRatio: scrollSnapshotBeforeFocus.newRatio
            }
          : null;
        restoreHighlights();
      } else {
        pendingJumpDir = 0;
      }
      return;
    }

    const ids = collectChangeHids();
    if (!ids.length) return;

    // Y in scroll content coords (use the scroll container — not inner+scrollTop)
    function segScrollTop(el, scrollEl) {
      if (!el) return 0;
      const er = el.getBoundingClientRect();
      const br = scrollEl.getBoundingClientRect();
      return er.top - br.top + scrollEl.scrollTop;
    }

    const margin = 12;
    const viewTop = newBody.scrollTop;
    const maxN = Math.max(0, newBody.scrollHeight - newBody.clientHeight);
    const maxO = Math.max(0, oldBody.scrollHeight - oldBody.clientHeight);
    const viewBot = viewTop + newBody.clientHeight;
    const tops = ids.map(id => {
      const nEl = newInner.querySelector(':scope > .seg[data-hid="' + id + '"]');
      const oEl = oldInner.querySelector(':scope > .seg[data-hid="' + id + '"]');
      const top = nEl
        ? segScrollTop(nEl, newBody)
        : segScrollTop(oEl, oldBody);
      return { id, top, nEl, oEl };
    });
    const n = tops.length;

    // Current change = last one at or above the pin line (viewport top + margin).
    // Near document end, scroll clamps so last tops stay > pin — also treat the
    // last change still inside the viewport as current (enables ▼ wrap to first).
    const pin = viewTop + margin;
    let cur = -1;
    for (let i = 0; i < n; i++) {
      if (tops[i].top <= pin + 8) cur = i;
    }
    if (viewTop >= maxN - 2) {
      for (let i = 0; i < n; i++) {
        if (tops[i].top < viewBot - 4) cur = i;
      }
    }

    let idx;
    if (dir > 0) {
      idx = (cur + 1) % n; // cur=-1 → 0; last → 0 (wrap)
    } else {
      idx = cur <= 0 ? n - 1 : cur - 1; // at/before first → last (wrap)
    }

    const target = tops[idx];
    const nextTop = Math.max(0, Math.min(maxN, target.top - margin));

    isSyncing = true;
    newBody.scrollTop = nextTop;
    if (Math.abs(newBody.scrollHeight - oldBody.scrollHeight) <= 2 || Math.abs(maxN - maxO) <= 2) {
      oldBody.scrollTop = Math.max(0, Math.min(maxO, nextTop));
    } else {
      oldBody.scrollTop = maxN > 0 ? (nextTop / maxN) * maxO : 0;
    }
    isSyncing = false;
    flashDiffSeg(target.nEl);
    flashDiffSeg(target.oEl);
    drawMinimap();
  }

  /**
   * Return-to-diff scroll:
   * - Always prefer pre-focus scrollTop when available (same feel as no-edit).
   * - If document height changed a lot, re-anchor by pre-focus viewport text offset.
   * - If caret exists, only nudge so it stays inside the viewport (no big jumps).
   */
  function applyReturnScroll(snap, caretAnchor, fallbackAnchor, anchorO) {
    const maxN = () => Math.max(0, newBody.scrollHeight - newBody.clientHeight);
    const maxO = () => Math.max(0, oldBody.scrollHeight - oldBody.clientHeight);

    if (snap) {
      const hNow = newBody.scrollHeight;
      const hWas = snap.newHeight || hNow;
      const heightDelta = Math.abs(hNow - hWas);

      if (heightDelta < 80 || snap.topOffset == null) {
        // Near-identical layout (one-char edit etc.): restore absolute scroll
        newBody.scrollTop = Math.max(0, Math.min(maxN(), snap.new));
        oldBody.scrollTop = Math.max(0, Math.min(maxO(), snap.old));
      } else if (snap.topOffset != null) {
        // Large height change: put the same text that was at the top, back at the top
        restoreTextAnchor(newBody, newInner, {
          type: "char",
          offset: snap.topOffset,
          ratio: snap.newRatio || 0
        });
        // Pin that character to viewport top
        try {
          const range = rangeFromCharOffset(newInner, snap.topOffset);
          const r = range.getBoundingClientRect();
          const parentTop = newBody.getBoundingClientRect().top;
          if (r && (r.height > 0 || r.top !== 0)) {
            newBody.scrollTop = Math.max(
              0,
              Math.min(maxN(), newBody.scrollTop + (r.top - parentTop - 12))
            );
          }
        } catch (_) { /* keep ratio-ish position */ }
        // Left: preserve pre-focus ratio relative to right
        if (maxN() > 0 && maxO() > 0) {
          oldBody.scrollTop = (newBody.scrollTop / maxN()) * maxO();
        } else {
          oldBody.scrollTop = Math.max(0, Math.min(maxO(), snap.old));
        }
      }
    } else if (fallbackAnchor) {
      restoreTextAnchor(newBody, newInner, fallbackAnchor);
      restoreTextAnchor(oldBody, oldInner, anchorO);
    }

    // Caret: only ensure visible — do not recenter the whole pane on it
    if (caretAnchor && caretAnchor.type === "caret") {
      ensureCharVisible(newBody, newInner, caretAnchor.offset, 24);
      if (maxN() > 0 && maxO() > 0) {
        // Keep left in sync after any nudge
        oldBody.scrollTop = (newBody.scrollTop / maxN()) * maxO();
      }
    } else if (!snap && maxN() > 0 && maxO() > 0) {
      oldBody.scrollTop = (newBody.scrollTop / maxN()) * maxO();
    }
  }

  /** Nudge scroll so char offset is inside viewport; no-op if already visible. */
  function ensureCharVisible(scrollEl, root, offset, margin) {
    if (offset == null || !root) return;
    const m = margin == null ? 16 : margin;
    try {
      const range = rangeFromCharOffset(root, offset);
      const r = range.getBoundingClientRect();
      const pr = scrollEl.getBoundingClientRect();
      if (!r || (r.height === 0 && r.top === 0 && r.bottom === 0)) return;
      const max = Math.max(0, scrollEl.scrollHeight - scrollEl.clientHeight);
      if (r.top < pr.top + m) {
        scrollEl.scrollTop = Math.max(0, Math.min(max, scrollEl.scrollTop + (r.top - pr.top - m)));
      } else if (r.bottom > pr.bottom - m) {
        scrollEl.scrollTop = Math.max(0, Math.min(max, scrollEl.scrollTop + (r.bottom - pr.bottom + m)));
      }
    } catch (_) { /* ignore */ }
  }

  /** Viewport-top character offset (stable across highlight ↔ plain height changes). */
  function charOffsetInRoot(root, node, nodeOffset) {
    if (!root || !node) return 0;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(n) {
        const p = n.parentElement;
        if (p && p.closest && p.closest(".gap, .seg-fill")) {
          return NodeFilter.FILTER_REJECT;
        }
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    let count = 0;
    let n;
    while ((n = walker.nextNode())) {
      if (n === node) {
        return count + Math.min(Math.max(0, nodeOffset), n.nodeValue.length);
      }
      count += n.nodeValue.length;
    }
    return count;
  }

  function rangeFromCharOffset(root, offset) {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(n) {
        const p = n.parentElement;
        if (p && p.closest && p.closest(".gap, .seg-fill")) {
          return NodeFilter.FILTER_REJECT;
        }
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    let remain = Math.max(0, offset | 0);
    let n;
    while ((n = walker.nextNode())) {
      const len = n.nodeValue.length;
      if (remain <= len) {
        const range = document.createRange();
        range.setStart(n, remain);
        range.collapse(true);
        return range;
      }
      remain -= len;
    }
    const range = document.createRange();
    range.selectNodeContents(root);
    range.collapse(false);
    return range;
  }

  function getTextAnchor(scrollEl, root) {
    const max = scrollEl.scrollHeight - scrollEl.clientHeight;
    const ratio = max > 0 ? scrollEl.scrollTop / max : 0;
    if (!root || !(root.textContent || "").length) {
      return { type: "ratio", ratio, offset: 0 };
    }
    try {
      const rect = scrollEl.getBoundingClientRect();
      const x = rect.left + Math.min(48, Math.max(12, rect.width * 0.15));
      const y = rect.top + 12;
      let startNode = null;
      let startOff = 0;
      if (document.caretRangeFromPoint) {
        const r = document.caretRangeFromPoint(x, y);
        if (r) {
          startNode = r.startContainer;
          startOff = r.startOffset;
        }
      } else if (document.caretPositionFromPoint) {
        const p = document.caretPositionFromPoint(x, y);
        if (p) {
          startNode = p.offsetNode;
          startOff = p.offset;
        }
      }
      if (startNode && root.contains(startNode)) {
        // If landed on non-text / spacer, fall back to ratio
        if (startNode.nodeType === Node.ELEMENT_NODE) {
          const el = startNode;
          if (el.classList && (el.classList.contains("gap") || el.classList.contains("seg-fill"))) {
            return { type: "ratio", ratio, offset: 0 };
          }
        }
        const offset = charOffsetInRoot(root, startNode, startOff);
        return { type: "char", offset, ratio };
      }
    } catch (_) { /* ignore */ }
    return { type: "ratio", ratio, offset: 0 };
  }

  function restoreTextAnchor(scrollEl, root, anchor) {
    if (!anchor || !scrollEl) return;
    const max = Math.max(0, scrollEl.scrollHeight - scrollEl.clientHeight);
    if (anchor.type === "char" && root) {
      try {
        const range = rangeFromCharOffset(root, anchor.offset);
        const r = range.getBoundingClientRect();
        const parentTop = scrollEl.getBoundingClientRect().top;
        if (r && (r.height > 0 || r.width > 0 || r.top !== 0)) {
          scrollEl.scrollTop = Math.max(0, Math.min(max, scrollEl.scrollTop + (r.top - parentTop - 12)));
          return;
        }
      } catch (_) { /* fall through */ }
      // Approximate by text fraction if geometry failed
      const len = Math.max(1, (root.textContent || "").length);
      scrollEl.scrollTop = (anchor.offset / len) * max;
      return;
    }
    scrollEl.scrollTop = (anchor.ratio || 0) * max;
  }

  /** Restore last highlight view without recomputing (no edits). */
  function restoreHighlights() {
    if (!lastDiffs || isDirty) return false;
    // Keep SoT in sync with plain pane before re-applying HTML
    const plain = readPlain(newInner);
    if (plain) newText = plain;
    render(lastDiffs);
    return true;
  }

  /** Line-level diff (structure for alignment), not pure char-level. */
  function computeLineDiffs(a, b) {
    const line = dmp.diff_linesToChars_(a || "", b || "");
    const diffs = dmp.diff_main(line.chars1, line.chars2, false);
    dmp.diff_charsToLines_(diffs, line.lineArray);
    // Merge consecutive insert/delete ops so a rewrite block pairs as one change hunk
    // (otherwise: del,del,ins,ins stacks gaps and drifts badly).
    const out = [];
    for (let i = 0; i < diffs.length; i++) {
      const op = diffs[i][0];
      const tx = diffs[i][1];
      if (!tx) continue;
      const prev = out.length ? out[out.length - 1] : null;
      if (prev && prev[0] === op && op !== 0) {
        prev[1] += tx;
      } else {
        out.push([op, tx]);
      }
    }
    return out;
  }

  function doDiff() {
    if (isDiffing) return;
    const curOld = readPlain(oldInner);
    const curNew = readPlain(newInner);
    if (curOld) oldText = curOld;
    if (curNew) newText = curNew;

    if (!oldText && !newText) {
      alert("テキストがありません。");
      return;
    }

    isDiffing = true;

    setTimeout(() => {
      try {
        const diffs = computeLineDiffs(oldText || "", newText || "");
        render(diffs);
        setDirty(false);
      } catch (err) {
        console.error(err);
        alert("エラー: " + (err.message || err));
        setDirty(true);
      } finally {
        isDiffing = false;
      }
    }, 40);
  }

  // Drag & Drop
  function setupDrop(panel, isOld) {
    panel.addEventListener("dragover", e => { e.preventDefault(); panel.classList.add("drag-over"); });
    panel.addEventListener("dragleave", e => {
      if (!panel.contains(e.relatedTarget)) panel.classList.remove("drag-over");
    });
    panel.addEventListener("drop", e => {
      e.preventDefault();
      panel.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const text = normalize(reader.result || "");
        if (isOld) {
          oldText = text;
          oldFileName = file.name;
          oldFname.textContent = file.name;
          oldInner.textContent = text;
        } else {
          newText = text;
          newFileName = file.name;
          newFname.textContent = file.name;
          newInner.textContent = text;
        }
        // Auto diff whenever both sides have text
        if (oldText && newText) {
          doDiff();
        } else {
          setDirty(true);
        }
      };
      reader.readAsText(file, "UTF-8");
    });
  }
  setupDrop($("panel-old"), true);
  setupDrop($("panel-new"), false);

  // Click position before focus strips highlights (gray gaps change layout)
  let pendingCaretAnchor = null;

  function captureCaretAnchorAtPoint(root, clientX, clientY) {
    if (!root) return null;
    function hit(x, y) {
      try {
        if (document.caretRangeFromPoint) {
          const r = document.caretRangeFromPoint(x, y);
          if (r) return { node: r.startContainer, offset: r.startOffset };
        } else if (document.caretPositionFromPoint) {
          const p = document.caretPositionFromPoint(x, y);
          if (p) return { node: p.offsetNode, offset: p.offset };
        }
      } catch (_) { /* ignore */ }
      return null;
    }
    function usable(node) {
      if (!node || !root.contains(node)) return false;
      if (node.nodeType === Node.TEXT_NODE) {
        const p = node.parentElement;
        if (p && p.closest && p.closest(".gap, .seg-fill")) return false;
        return true;
      }
      return false;
    }
    let hitInfo = hit(clientX, clientY);
    if (!hitInfo || !usable(hitInfo.node)) {
      // Gray spacer / padding: probe nearby for real text
      const probes = [0, -6, 6, -14, 14, -28, 28, -48, 48];
      hitInfo = null;
      for (let i = 0; i < probes.length; i++) {
        const h = hit(clientX, clientY + probes[i]);
        if (h && usable(h.node)) { hitInfo = h; break; }
      }
    }
    if (!hitInfo || !usable(hitInfo.node)) return null;
    const offset = charOffsetInRoot(root, hitInfo.node, hitInfo.offset);
    return {
      type: "caret",
      offset: offset,
      clientY: clientY,
      clientX: clientX
    };
  }

  function captureCaretAnchorFromSelection(root) {
    try {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount < 1) return null;
      const r = sel.getRangeAt(0);
      if (!root.contains(r.startContainer)) return null;
      if (r.startContainer.nodeType === Node.TEXT_NODE) {
        const p = r.startContainer.parentElement;
        if (p && p.closest && p.closest(".gap, .seg-fill")) return null;
      }
      const br = r.getBoundingClientRect();
      return {
        type: "caret",
        offset: charOffsetInRoot(root, r.startContainer, r.startOffset),
        clientY: (br && br.top) ? br.top : (newBody.getBoundingClientRect().top + 12),
        clientX: (br && br.left) ? br.left : 0
      };
    } catch (_) {
      return null;
    }
  }

  /** Refresh clientY/X for a char-offset anchor from current layout (before DOM swap). */
  function refreshAnchorScreenY(root, anchor) {
    if (!anchor || anchor.type !== "caret" || !root) return anchor;
    try {
      const range = rangeFromCharOffset(root, anchor.offset);
      const r = range.getBoundingClientRect();
      if (r && (r.height > 0 || r.top !== 0)) {
        return {
          type: "caret",
          offset: anchor.offset,
          clientY: r.top,
          clientX: r.left
        };
      }
    } catch (_) { /* ignore */ }
    return anchor;
  }

  function noteEditCaret(anchor) {
    if (anchor && anchor.type === "caret") {
      lastEditCaretAnchor = anchor;
    }
  }

  function updateLastEditCaretFromSelection() {
    if (document.activeElement !== newInner) return;
    const a = captureCaretAnchorFromSelection(newInner);
    if (a) lastEditCaretAnchor = a;
  }

  /** Keep the same character under the cursor after layout height changes. */
  function restoreCaretAnchor(scrollEl, root, anchor) {
    if (!anchor) return;
    if (anchor.type !== "caret") {
      restoreTextAnchor(scrollEl, root, anchor);
      return;
    }
    const max = Math.max(0, scrollEl.scrollHeight - scrollEl.clientHeight);
    const place = () => {
      const range = rangeFromCharOffset(root, anchor.offset);
      try {
        const sel = window.getSelection();
        if (sel) {
          sel.removeAllRanges();
          sel.addRange(range);
        }
      } catch (_) { /* ignore */ }
      return range;
    };
    let range = place();
    try {
      const r = range.getBoundingClientRect();
      if (r && typeof anchor.clientY === "number") {
        // Move scroll so caret stays at the same screen Y as the click
        scrollEl.scrollTop = Math.max(
          0,
          Math.min(max, scrollEl.scrollTop + (r.top - anchor.clientY))
        );
      }
    } catch (_) {
      const len = Math.max(1, (root.textContent || "").length);
      scrollEl.scrollTop = (anchor.offset / len) * max;
    }
    // Selection can be lost after scrollTop change
    place();
  }

  newInner.addEventListener("pointerdown", e => {
    if (isPlainEditing) return;
    if (!newInner.querySelector("span")) {
      pendingCaretAnchor = null;
      return;
    }
    // Capture before focus handler strips DOM (gaps disappear)
    pendingCaretAnchor = captureCaretAnchorAtPoint(newInner, e.clientX, e.clientY);
    noteEditCaret(pendingCaretAnchor);
  }, true);

  // When user starts editing the right side, convert highlighted HTML
  // back to plain text. This prevents freezes caused by the browser
  // trying to split many <span> elements when pressing Enter.
  newInner.addEventListener("focus", () => {
    if (isPlainEditing) return;
    // Only convert if there are highlight / alignment spans
    if (newInner.querySelector("span")) {
      // Remember exact scroll before layout changes (for return-to-diff)
      const topA = getTextAnchor(newBody, newInner);
      scrollSnapshotBeforeFocus = {
        new: newBody.scrollTop,
        old: oldBody.scrollTop,
        newHeight: newBody.scrollHeight,
        oldHeight: oldBody.scrollHeight,
        topOffset: (topA && topA.type === "char") ? topA.offset : null,
        newRatio: (topA && typeof topA.ratio === "number")
          ? topA.ratio
          : (newBody.scrollHeight > newBody.clientHeight
            ? newBody.scrollTop / (newBody.scrollHeight - newBody.clientHeight)
            : 0)
      };

      // Prefer click/caret position over viewport-top (gray boxes shift layout)
      let anchor = pendingCaretAnchor;
      pendingCaretAnchor = null;
      if (!anchor) anchor = captureCaretAnchorFromSelection(newInner);
      if (!anchor) anchor = getTextAnchor(newBody, newInner);
      noteEditCaret(anchor);

      const plain = readPlain(newInner);
      newInner.textContent = plain;   // remove all spans → single text node
      newText = plain;
      isPlainEditing = true;
      highlightsCleared = true;

      requestAnimationFrame(() => {
        isSyncing = true;
        // Right only: left stays at pre-focus scroll (still has gaps/highlights)
        restoreCaretAnchor(newBody, newInner, anchor);
        if (scrollSnapshotBeforeFocus) {
          const maxO = Math.max(0, oldBody.scrollHeight - oldBody.clientHeight);
          oldBody.scrollTop = Math.max(0, Math.min(maxO, scrollSnapshotBeforeFocus.old));
        }
        requestAnimationFrame(() => {
          // Second pass: layout may settle after first scroll
          restoreCaretAnchor(newBody, newInner, anchor);
          noteEditCaret(refreshAnchorScreenY(newInner, anchor));
          // Keep left locked — do not ratio-sync from collapsed plain right pane
          if (scrollSnapshotBeforeFocus) {
            const maxO = Math.max(0, oldBody.scrollHeight - oldBody.clientHeight);
            oldBody.scrollTop = Math.max(0, Math.min(maxO, scrollSnapshotBeforeFocus.old));
          }
          isSyncing = false;
          drawMinimap();
        });
      });
    }
  });

  newInner.addEventListener("blur", () => {
    isPlainEditing = false;
    // Snapshot caret (for edited return) before selection is cleared
    let anchor =
      captureCaretAnchorFromSelection(newInner) ||
      lastEditCaretAnchor ||
      getTextAnchor(newBody, newInner);
    anchor = refreshAnchorScreenY(newInner, anchor);
    noteEditCaret(anchor);

    // Leave the pane → auto restore or re-diff (no manual button)
    setTimeout(() => {
      if (document.activeElement === newInner) return;
      if (isDiffing) return;

      if (isDirty) {
        // Edited: same base as no-edit (pre-focus scroll), caret only nudges if off-screen
        pendingScrollSnapshot = scrollSnapshotBeforeFocus
          ? {
              new: scrollSnapshotBeforeFocus.new,
              old: scrollSnapshotBeforeFocus.old,
              newHeight: scrollSnapshotBeforeFocus.newHeight,
              oldHeight: scrollSnapshotBeforeFocus.oldHeight,
              topOffset: scrollSnapshotBeforeFocus.topOffset,
              newRatio: scrollSnapshotBeforeFocus.newRatio
            }
          : null;
        pendingRestoreAnchor = (anchor && anchor.type === "caret") ? anchor : null;
        doDiff();
      } else if (highlightsCleared && lastDiffs) {
        // No edit: restore identical diff DOM + exact pre-focus scroll
        pendingRestoreAnchor = null;
        pendingScrollSnapshot = scrollSnapshotBeforeFocus
          ? {
              new: scrollSnapshotBeforeFocus.new,
              old: scrollSnapshotBeforeFocus.old,
              newHeight: scrollSnapshotBeforeFocus.newHeight,
              oldHeight: scrollSnapshotBeforeFocus.oldHeight,
              topOffset: scrollSnapshotBeforeFocus.topOffset,
              newRatio: scrollSnapshotBeforeFocus.newRatio
            }
          : null;
        restoreHighlights();
      } else {
        pendingRestoreAnchor = null;
        pendingScrollSnapshot = null;
      }
    }, 0);
  });

  // Escape: leave edit mode (blur → auto restore / re-diff)
  newInner.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      e.preventDefault();
      updateLastEditCaretFromSelection();
      newInner.blur();
      return;
    }
    // Track caret while typing / moving
    if (highlightsCleared || isPlainEditing) {
      // keyup is better for arrows after move; also schedule here
      setTimeout(updateLastEditCaretFromSelection, 0);
    }
  });

  newInner.addEventListener("keyup", updateLastEditCaretFromSelection);
  newInner.addEventListener("mouseup", updateLastEditCaretFromSelection);
  document.addEventListener("selectionchange", () => {
    if (document.activeElement === newInner) updateLastEditCaretFromSelection();
  });

  // Any real edit makes the diff dirty (recomputed on blur)
  newInner.addEventListener("input", () => {
    setDirty(true);
    updateLastEditCaretFromSelection();
  });

  // Paste
  newInner.addEventListener("paste", () => {
    setTimeout(() => {
      newText = normalize(newInner.innerText || "");
      if (!newFileName) { newFileName = "pasted_new.txt"; newFname.textContent = newFileName; }
      setDirty(true);
      updateLastEditCaretFromSelection();
    }, 20);
  });

  async function saveNewText() {
    const text = readPlain(newInner) || newText;
    if (!text) {
      alert("保存するテキストがありません。");
      return;
    }

    let suggested = (newFileName || "novel_revised.txt").trim() || "novel_revised.txt";
    if (!/\.[a-z0-9]+$/i.test(suggested)) suggested += ".txt";

    // Native OS save dialog (Chrome / Edge など). フォルダとファイル名を選べる。
    if (typeof window.showSaveFilePicker === "function") {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: suggested,
          types: [
            {
              description: "テキストファイル",
              accept: { "text/plain": [".txt"] },
            },
          ],
          excludeAcceptAllOption: false,
        });
        const writable = await handle.createWritable();
        await writable.write(new Blob([text], { type: "text/plain;charset=utf-8" }));
        await writable.close();
        if (handle.name) {
          newFileName = handle.name;
          newFname.textContent = handle.name;
        }
        return;
      } catch (err) {
        // ユーザーがキャンセルした場合は何もしない
        if (err && (err.name === "AbortError" || err.name === "NotAllowedError")) return;
        console.error(err);
        // 権限エラー等はフォールバックへ
      }
    }

    // Fallback: ブラウザ標準のダウンロード（保存先はブラウザ設定依存）
    let name = suggested;
    if (typeof window.showSaveFilePicker !== "function") {
      const typed = prompt("ファイル名を入力してください（このブラウザはOS保存ダイアログ非対応）", suggested);
      if (typed === null || !typed.trim()) return;
      name = typed.trim();
      if (!/\.[a-z0-9]+$/i.test(name)) name += ".txt";
    }
    const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
    newFileName = name;
    newFname.textContent = name;
  }

  btnSave.addEventListener("click", () => {
    saveNewText().catch(err => {
      console.error(err);
      alert("保存に失敗しました: " + (err && err.message ? err.message : err));
    });
  });

  if (btnPrevDiff) btnPrevDiff.addEventListener("click", () => jumpToDiff(-1));
  if (btnNextDiff) btnNextDiff.addEventListener("click", () => jumpToDiff(1));

  // Settings
  fontSizeSel.addEventListener("change", applySettings);
  charWidthInp.addEventListener("change", applySettings);
  charWidthInp.addEventListener("input", applySettings);

  // Scroll sync — prefer 1:1 pixels when heights match (avoids mid-doc 1-line drift)
  function sync(from, to) {
    if (isSyncing) return;
    isSyncing = true;
    const maxF = from.scrollHeight - from.clientHeight;
    const maxT = to.scrollHeight - to.clientHeight;
    if (maxF <= 0) {
      to.scrollTop = 0;
    } else if (Math.abs(from.scrollHeight - to.scrollHeight) <= 2 || Math.abs(maxF - maxT) <= 2) {
      // Same scroll range → lock pixel-for-pixel
      to.scrollTop = Math.max(0, Math.min(maxT, from.scrollTop));
    } else {
      to.scrollTop = (from.scrollTop / maxF) * maxT;
    }
    requestAnimationFrame(() => { isSyncing = false; drawMinimap(); });
  }
  oldBody.addEventListener("scroll", () => sync(oldBody, newBody));
  newBody.addEventListener("scroll", () => sync(newBody, oldBody));

  // Minimap (character-level dots via binning)
  function drawMinimap() {
    const canvas = minimap;
    const wrap = minimapWrap;
    const dpr = window.devicePixelRatio || 1;
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    if (w < 1 || h < 1) return;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    const ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#eceff1";
    ctx.fillRect(0, 0, w, h);

    if (lastDiffs && lastDiffs.length) {
      let total = 0;
      for (const d of lastDiffs) total += d[1].length;
      if (total > 0) {
        const bins = Math.max(h * 2, 1);
        const binSize = total / bins;
        const col = new Uint8Array(bins);
        let pos = 0;
        for (const d of lastDiffs) {
          const len = d[1].length;
          const c = d[0] === -1 ? 1 : (d[0] === 1 ? 2 : 0);
          if (c) {
            const s = Math.floor(pos / binSize);
            const e = Math.floor((pos + len) / binSize);
            for (let b = s; b <= e && b < bins; b++) col[b] = c;
          }
          pos += len;
        }
        const dw = Math.max(2, Math.floor(w * 0.55));
        const x0 = Math.floor((w - dw) / 2);
        for (let b = 0; b < bins; b++) {
          if (!col[b]) continue;
          ctx.fillStyle = col[b] === 1 ? "#e57373" : "#81c784";
          ctx.fillRect(x0, (b / bins) * h, dw, Math.max(1, h / bins + 0.5));
        }
      }
    }

    // viewport
    const panel = oldBody.scrollHeight > 0 ? oldBody : newBody;
    const maxS = panel.scrollHeight - panel.clientHeight;
    if (maxS > 0) {
      const vt = (panel.scrollTop / panel.scrollHeight) * h;
      const vh = (panel.clientHeight / panel.scrollHeight) * h;
      ctx.strokeStyle = "rgba(33,150,243,0.85)";
      ctx.lineWidth = 2;
      ctx.strokeRect(1, vt, w - 2, Math.max(vh, 4));
      ctx.fillStyle = "rgba(33,150,243,0.12)";
      ctx.fillRect(1, vt, w - 2, Math.max(vh, 4));
    }
  }

  function scrollToMinimapY(clientY) {
    const rect = minimap.getBoundingClientRect();
    if (rect.height <= 0) return;
    const p = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
    isSyncing = true;
    const maxO = oldBody.scrollHeight - oldBody.clientHeight;
    const maxN = newBody.scrollHeight - newBody.clientHeight;
    // Prefer 1:1 when heights match
    if (Math.abs(oldBody.scrollHeight - newBody.scrollHeight) <= 2) {
      const top = p * Math.max(maxO, maxN, 0);
      oldBody.scrollTop = Math.max(0, Math.min(Math.max(0, maxO), top));
      newBody.scrollTop = Math.max(0, Math.min(Math.max(0, maxN), top));
    } else {
      oldBody.scrollTop = p * Math.max(0, maxO);
      newBody.scrollTop = p * Math.max(0, maxN);
    }
    drawMinimap();
    requestAnimationFrame(() => { isSyncing = false; });
  }

  let minimapDragging = false;

  minimap.addEventListener("pointerdown", e => {
    if (e.button != null && e.button !== 0) return;
    minimapDragging = true;
    try { minimap.setPointerCapture(e.pointerId); } catch (_) { /* ignore */ }
    minimap.style.cursor = "grabbing";
    scrollToMinimapY(e.clientY);
    e.preventDefault();
  });

  minimap.addEventListener("pointermove", e => {
    if (!minimapDragging) return;
    scrollToMinimapY(e.clientY);
    e.preventDefault();
  });

  function endMinimapDrag(e) {
    if (!minimapDragging) return;
    minimapDragging = false;
    minimap.style.cursor = "grab";
    try {
      if (e && e.pointerId != null) minimap.releasePointerCapture(e.pointerId);
    } catch (_) { /* ignore */ }
  }

  minimap.addEventListener("pointerup", endMinimapDrag);
  minimap.addEventListener("pointercancel", endMinimapDrag);
  minimap.addEventListener("lostpointercapture", () => {
    minimapDragging = false;
    minimap.style.cursor = "grab";
  });

  // Keep click as jump (also covered by pointerdown)
  minimap.style.cursor = "grab";
  minimap.style.touchAction = "none";

  window.addEventListener("resize", () => { applySettings(); drawMinimap(); });

  // Init
  applySettings();
  drawMinimap();
})();
</script>
</body>
</html>
