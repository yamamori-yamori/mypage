<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>縦view</title>
  <!-- iPad/iPhone: ホーム画面追加時に Safari のアドレスバー・タブを出さない -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="縦view" />
  <meta name="theme-color" content="#f7f5ef" />
  <meta name="application-name" content="縦view" />
  <!-- display:standalone（iOS 16.4+ のホーム画面 Web App 向け）。start_url は追加時の URL が使われる -->
  <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22%E7%B8%A6view%22%2C%22short_name%22%3A%22%E7%B8%A6view%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f7f5ef%22%2C%22theme_color%22%3A%22%23f7f5ef%22%7D" />
  <style>
:root {
  --fs: 20px;
  --bg: #f7f5ef;
  --fg: #1a1a1a;
  --panel: #ece8dd;
  --border: #d5cfbf;
  --accent: #8a5a2b;
  --half: #1f9d4a;
  --space-full: #f0c4d0;
  --space-half: #7dcca0;
  --mark: #ffe58a;
  --heading1: #b0392f;
  --heading2: #2f6bb0;
  --grid: #ddd6c4;
}
:root[data-theme='dark'] {
  --bg: #1b1c1e;
  --fg: #e8e6e0;
  --panel: #26282b;
  --border: #3a3d41;
  --accent: #d9a066;
  --half: #4ade80;
  --space-full: #f5c8d6;
  --space-half: #86efac;
  --mark: #6b5a1e;
  --heading1: #ff8a7a;
  --heading2: #8ab6ff;
  --grid: #3a3c40;
}
:root[data-font='mincho'] { --font: 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'MS Mincho', serif; }
:root[data-font='gothic'] { --font: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif; }

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#topbar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 5px 10px;
  display: flex; align-items: center; gap: 5px 7px; flex-wrap: wrap;
  font-size: 13px;
}
#topbar .brand { font-weight: 700; font-size: 16px; color: var(--accent); letter-spacing: 0.03em; }
#fileMeta {
  font-size: 12px;
  flex: 1 1 18em;
  min-width: 12em;
  max-width: min(48em, 55vw);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#topbar #searchInput { width: 8em; }
#topbar button { padding: 3px 8px; }
.badge {
  font-size: 12px; color: var(--accent); white-space: nowrap; opacity: 0.85;
}

label { display: inline-flex; align-items: center; gap: 4px; }
select, input[type='number'], input[type='text'] {
  font: inherit; padding: 2px 4px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg); color: var(--fg);
}
input[type='number'] { width: 3.5em; }
button {
  font: inherit; padding: 3px 10px; border: 1px solid var(--border); border-radius: 5px;
  background: var(--bg); color: var(--fg); cursor: pointer;
}
button:hover { border-color: var(--accent); }
button.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
button.primary:hover { filter: brightness(1.08); }
.sep { width: 1px; height: 20px; background: var(--border); }

main { flex: 1; display: flex; min-height: 0; }

/* 左サイドバー: サムネイル(上) + 下段メニュー(下) */
#sidebar {
  width: 168px; flex: 0 0 auto; display: flex; flex-direction: column;
  background: var(--panel); border-right: 1px solid var(--border); min-height: 0;
}
/* 章/話記号バー（サムネの上・常時1行） */
#markBar.mark-bar {
  flex: 0 0 auto;
  display: flex;
  flex-wrap: nowrap;
  align-items: center;
  justify-content: space-between;
  gap: 2px 4px;
  padding: 4px 5px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  line-height: 1.2;
  min-width: 0;
}
#markBar label {
  display: inline-flex;
  align-items: center;
  gap: 1px;
  min-width: 0;
  white-space: nowrap;
  font-weight: 700;
}
#markBar .mark-ch { color: var(--heading1); }
#markBar .mark-ep { color: var(--heading2); }
#markBar input[type='text'] {
  width: 2.2em;
  min-width: 1.6em;
  max-width: 3.2em;
  padding: 1px 2px;
  font-size: 10px;
  font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
  text-align: center;
  font-weight: 700;
}
#markBar .mark-ch input { color: var(--heading1); }
#markBar .mark-ep input { color: var(--heading2); }
#thumbs {
  flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
  padding: 4px; user-select: none;
}
#controls {
  flex: 0 0 auto; border-top: 1px solid var(--border);
  padding: 5px; display: flex; flex-direction: column; gap: 3px; font-size: 11px;
}
#controls .ctrl-row { display: flex; flex-wrap: wrap; align-items: center; gap: 3px 6px; }
#controls .ctrl-row.nav { gap: 4px; }
#controls .ctrl-row.nav button { flex: 1 1 auto; font-size: 11px; padding: 3px 4px; }
#controls .ctrl-row.status { gap: 4px; opacity: 0.9; font-variant-numeric: tabular-nums; font-size: 12px; }
#controls #jumpInput { width: 3.5em; font-size: 12px; }
#controls #progress { color: var(--accent); min-height: 1em; }
#controls hr { width: 100%; border: none; border-top: 1px solid var(--border); margin: 1px 0; }
#controls #progress:empty { display: none; }
#controls select { max-width: 100%; font-size: 11px; }
#controls .ctrl-row.font-row {
  display: flex;
  flex-wrap: nowrap;
  gap: 4px;
  align-items: center;
}
#controls .ctrl-row.font-row select {
  flex: 1 1 0;
  min-width: 0;
  max-width: none;
}
/* チェック6個をちょうど2列×3行 */
#controls .ctrl-row.checks {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 2px 6px;
  align-items: center;
}
#controls .ctrl-row.checks label {
  gap: 2px;
  font-size: 11px;
  white-space: nowrap;
  min-width: 0;
}
#controls .ctrl-row.checks input[type="checkbox"] {
  width: 12px;
  height: 12px;
  margin: 0;
}
#controls .app-credit {
  margin-top: 4px;
  padding-top: 4px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 4px 8px;
  align-items: baseline;
  font-size: 10px;
  line-height: 1.35;
  opacity: 0.62;
  color: var(--fg);
  user-select: none;
}
#controls .app-credit a {
  color: inherit;
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
}
#controls .app-credit a:hover { opacity: 1; color: var(--accent); }
.thumb {
  border: 1px solid var(--border); border-radius: 4px; background: var(--bg);
  margin-bottom: 6px; padding: 4px 6px; cursor: pointer; font-size: 11px;
  display: flex; flex-direction: column; gap: 2px; min-height: 34px;
}
.thumb:hover { border-color: var(--accent); }
.thumb.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
.thumb .tnum { color: var(--fg); opacity: 0.55; }
.thumb .thead { font-size: 10px; font-weight: 700; color: var(--heading1); line-height: 1.3; word-break: break-all; }
.thumb .thead.h2 { color: var(--heading2); }

#pageWrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 22px; overflow: hidden; }
#page {
  position: relative;
  display: flex; flex-direction: row-reverse; gap: 0.4em;
  height: 100%; align-items: flex-start; justify-content: center;
}
.col {
  writing-mode: vertical-rl;
  -webkit-writing-mode: vertical-rl;
  /* nowrap だと連続/行頭の半角スペースが潰れる。改行トークンはDOMに出さないので pre で保持 */
  white-space: pre;
  font-size: var(--fs);
  line-height: 1.7;
  letter-spacing: 0.05em;
  user-select: text;
}
/* 空行（中身のない列）でも通常幅の列として場所を確保する（原稿用紙の空行）。
 * ゼロ幅スペースで行ボックスを生成し、列の幅（=行の太さ）を保つ。 */
.col::after { content: "\200B"; }
.col.heading-1 { color: var(--heading1); font-weight: 700; }
.col.heading-2 { color: var(--heading2); font-weight: 700; }
.half { text-orientation: sideways; -webkit-text-orientation: sideways; }
/* heading の color より勝たせる（.col.heading-* は要素+2クラス） */
#page .col .half-color { color: var(--half); }
#page .col .space-full {
  color: var(--space-full);
  background-color: color-mix(in srgb, var(--space-full) 28%, transparent);
  border-radius: 1px;
}
#page .col .space-half {
  color: var(--space-half);
  background-color: color-mix(in srgb, var(--space-half) 28%, transparent);
  border-radius: 1px;
  white-space: pre;
}
rt { user-select: none; font-size: 0.5em; }
mark { background: var(--mark); color: inherit; }
/* 校正ジャンプ箇所: 四角枠で目立たせる（縦書きでも各トークンを囲む） */
#page mark.hl-warn {
  background: color-mix(in srgb, var(--mark) 70%, transparent);
  color: inherit;
  border: 2px solid var(--accent);
  border-radius: 2px;
  box-sizing: border-box;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
  padding: 0.02em 0.06em;
  margin: 0 -0.02em;
}
#page mark.hl-search {
  background: var(--mark);
  color: inherit;
  border: 1px solid color-mix(in srgb, var(--accent) 55%, transparent);
  border-radius: 2px;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
}

/* 原稿用紙の升目（縦横）。文字が無いマスにも罫線を引く。
 * --col-h = 1列の全長（charsPerColumn × セル間隔）、--cell = 1マスの間隔。JSが設定。 */
#page.grid { gap: 0; }
#page.grid .col {
  height: var(--col-h);
  box-sizing: border-box;
  border-left: 1px solid var(--grid);
  border-right: 1px solid var(--grid);
  /* 横罫線（各マスの区切り）。列全長にわたって繰り返すため空きマスにも出る。 */
  background-image:
    repeating-linear-gradient(to bottom,
      var(--grid) 0, var(--grid) 1px, transparent 1px, transparent var(--cell));
  background-position: 0 0;
}
/* 升目の目盛り: ページ外周に一列だけ（右=文字位置5単位, 上=列位置5単位） */
.ruler { position: absolute; color: var(--grid); font-size: 9px; pointer-events: none; user-select: none; }
.ruler span {
  position: absolute; writing-mode: horizontal-tb; -webkit-writing-mode: horizontal-tb; line-height: 1;
}
.ruler-right { top: 0; left: 100%; height: 100%; margin-left: 3px; }
.ruler-right span { left: 0; transform: translateY(-50%); }
.ruler-top { left: 0; bottom: 100%; width: 100%; margin-bottom: 3px; }
/* right で行センター位置を指定し、translateX(50%) で数字自体を中央揃え */
.ruler-top span { bottom: 0; transform: translateX(50%); text-align: center; }

/* トースト（自動更新通知など） */
#toast {
  position: fixed; top: 54px; left: 50%; transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.8); color: #fff; padding: 8px 18px; border-radius: 20px;
  font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;
}
#toast.show { opacity: 1; }

/* ドラッグ&ドロップ */
#dropHint {
  position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
  background: rgba(30, 30, 30, 0.55); color: #fff; font-size: 22px; z-index: 90;
  border: 4px dashed rgba(255, 255, 255, 0.7); border-radius: 8px; margin: 10px;
}
body.dragover #dropHint { display: flex; }

aside {
  width: 0; overflow: hidden; background: var(--panel); border-left: 1px solid var(--border);
  transition: width 0.15s; display: flex; flex-direction: column;
}
body.panel-open aside { width: 140px; }
aside .section { padding: 8px 6px; border-bottom: 1px solid var(--border); }
aside h2 { font-size: 12px; margin: 0 0 6px; }
#warnList { list-style: none; margin: 0; padding: 0; overflow: auto; flex: 1; }
.warn-item {
  padding: 4px 5px; font-size: 11px; border-bottom: 1px solid var(--border);
  cursor: pointer; line-height: 1.35; word-break: break-all;
}
.warn-item:hover { background: var(--bg); }
.warn-item .warn-line2 {
  margin-top: 2px;
  opacity: 0.78;
  font-size: 10px;
  line-height: 1.3;
}
/* 本文の校正ハイライトと同じ黄＋枠で「今見ている項目」を示す */
.warn-item.active {
  background: color-mix(in srgb, var(--mark) 70%, transparent);
  border: 2px solid var(--accent);
  border-radius: 2px;
  box-sizing: border-box;
  margin: 1px 2px;
  padding: 3px 5px;
}
.sev-error { border-left: 4px solid #d64545; }
.sev-warning { border-left: 4px solid #d9a520; }
.sev-info { border-left: 4px solid #4a90d9; }
.warn-item.active.sev-error,
.warn-item.active.sev-warning,
.warn-item.active.sev-info {
  /* active の四角枠を優先しつつ、重要度は左の色帯で残す */
  box-shadow: inset 4px 0 0 0 currentColor;
  border-left-color: var(--accent);
}
.warn-item.active.sev-error { box-shadow: inset 4px 0 0 0 #d64545; }
.warn-item.active.sev-warning { box-shadow: inset 4px 0 0 0 #d9a520; }
.warn-item.active.sev-info { box-shadow: inset 4px 0 0 0 #4a90d9; }

footer {
  background: var(--panel); border-top: 1px solid var(--border);
  padding: 5px 10px; display: flex; gap: 14px; align-items: center; font-size: 12px;
}
footer .spacer { flex: 1; }
#progress { color: var(--accent); }
.hint { opacity: 0.7; }

  <!-- 上部メニュー(1段): ロゴ / 開く / ファイル情報 / 更新|自動更新 / 検索 / 体裁 / 字・行 / 校正 -->
  <div id="topbar">
    <span class="brand">縦view</span>
    <button id="openFsBtn">開く</button>
    <input id="fileInput" type="file" accept=".txt,text/plain" hidden />
    <span id="fileMeta" class="hint" title="">ファイル未読み込み</span>
    <button id="reloadBtn" title="自動更新できない環境向け。同じ原稿を再読込（位置は維持）">更新</button>
    <span id="autoLabel" class="badge" hidden>自動更新</span>

    <span class="sep"></span>
    <input id="searchInput" type="text" placeholder="検索" />
    <button id="searchBtn" title="検索">🔍</button>
    <button id="searchPrev" title="前の一致">前</button>
    <button id="searchNext" title="次の一致">次</button>
    <span id="searchCount" class="hint"></span>

    <span class="sep"></span>
    <select id="presetSelect" title="体裁"></select>
    <label>字<input id="cpc" type="number" min="1" max="60" /></label>
    <label>行<input id="cpp" type="number" min="1" max="60" /></label>
    <button id="togglePanel" class="primary" title="校正パネル">校正</button>
  </div>

  <div id="toast"></div>
  <div id="dropHint">ここにテキストファイルをドロップ</div>

  <main>
    <div id="sidebar">
      <!-- 章/話記号: サムネ有無に関わらず常時表示（1行） -->
      <div id="markBar" class="mark-bar" title="行頭（半角/全角スペースのみ可）の見出し記号">
        <label class="mark-ch">章記号：<input id="chapterMark" type="text" value="#" maxlength="16" spellcheck="false" autocomplete="off" /></label>
        <label class="mark-ep">話記号：<input id="episodeMark" type="text" value="##" maxlength="16" spellcheck="false" autocomplete="off" /></label>
      </div>
      <div id="thumbs" title="ドラッグでページ移動"></div>
      <!-- 左メニュー: ページ移動 + 表示設定 -->
      <div id="controls">
        <div class="ctrl-row nav">
          <button id="nextBtn">◀ 次</button>
          <button id="prevBtn">前 ▶</button>
        </div>
        <div class="ctrl-row status">
          <label>ページ<input id="jumpInput" type="number" min="1" /></label>
          <span>/ <span id="totalPages">0</span></span>
        </div>
        <div class="ctrl-row status">
          <span><span id="pageChars">0</span>文字 / 総文字<span id="totalChars">0</span></span>
          <span id="progress"></span>
        </div>
        <hr />
        <div class="ctrl-row checks">
          <label><input id="kinsoku" type="checkbox" />禁則</label>
          <label><input id="burasage" type="checkbox" />ぶら下げ</label>
          <label><input id="showRuby" type="checkbox" />ルビ</label>
          <label><input id="halfColor" type="checkbox" />半角色</label>
          <label><input id="spaceColor" type="checkbox" />空白</label>
          <label><input id="gridLines" type="checkbox" />升目</label>
        </div>
        <div class="ctrl-row">
          <label>テーマ<select id="themeSelect"><option value="light">ライト</option><option value="dark">ダーク</option></select></label>
        </div>
        <div class="ctrl-row font-row">
          <select id="fontSelect" title="書体"><option value="mincho">明朝</option><option value="gothic">ゴシック</option></select>
          <select id="fontSize" title="字級"></select>
        </div>
        <div id="appCredit" class="app-credit">
          <span>v1.0</span>
          <span>by <a href="https://yamamori-yamori.github.io/mypage/" target="_blank" rel="noopener noreferrer">やまもりやもり</a></span>
        </div>
      </div>
    </div>

    <div id="pageWrap"><div id="page"></div></div>

    <aside>
      <div class="section">
        <h2>校正ワーニング <span id="warnTotal" class="hint"></span></h2>
        <div><button id="warnPrev">前</button> <button id="warnNext">次</button></div>
      </div>
      <ul id="warnList"></ul>
    </aside>
  </main>

  /** 再読込時は true。loaded で loadPosition せず pendingOffset を維持 */
  keepOffsetOnLoad: false,
  /** 「更新」から file ピッカーを開いた（開くとは別） */
  expectReloadPick: false,
  warnings: [],
  warnTotal: 0,
  warnIndex: -1,
  matches: [],
  matchIndex: -1,
};

function init() {
  state.worker = window.__createWorker();
  state.worker.onmessage = onWorkerMessage;
  bindUI();
  applyAppearance();
  buildPresetOptions();
  reflectSettingsToUI();
  populateFontSizes();
  installCopyHandler();
  window.addEventListener('resize', () => { populateFontSizes(); renderCurrent(); });
  window.addEventListener('keydown', onKey);
  window.addEventListener('mouseup', () => { scrubbing = false; });
  const wrap = $('pageWrap');
  wrap.addEventListener('wheel', onWheel, { passive: false });
  installSwipe(wrap);
  installDragAndDrop();
  startFileWatch();
}

/* ---------------- Drag & Drop ---------------- */
function installDragAndDrop() {
  const stop = (e) => { e.preventDefault(); e.stopPropagation(); };
  ['dragenter', 'dragover'].forEach((ev) =>
    window.addEventListener(ev, (e) => { stop(e); document.body.classList.add('dragover'); }));
  ['dragleave', 'drop'].forEach((ev) =>
    window.addEventListener(ev, (e) => { stop(e); if (ev === 'drop' || e.target === document.documentElement) document.body.classList.remove('dragover'); }));
  window.addEventListener('drop', async (e) => {
    document.body.classList.remove('dragover');
    const items = e.dataTransfer && e.dataTransfer.items;
    // File System Access のハンドルが取れれば自動更新監視も効く
    if (items && items.length && items[0].getAsFileSystemHandle) {
      try {
        const handle = await items[0].getAsFileSystemHandle();
        if (handle && handle.kind === 'file') {
          const file = await handle.getFile();
          openFile(file, handle);
          return;
        }
      } catch { /* フォールバック */ }
    }
    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) openFile(file, null);
  });
}

/* ---------------- Toast ---------------- */
let _toastTimer = null;
function showToast(msg, ms = 1000) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

/* ---------------- Worker ---------------- */
// リクエスト種別 -> チャンネル、レスポンス種別 -> チャンネル の対応。
// 世代管理は「チャンネル単位の最新 requestId」で行う。
const REQ_CHANNEL = { paginate: 'paginate', detectWarnings: 'warnings', search: 'search' };
const RES_CHANNEL = { paginated: 'paginate', warnings: 'warnings', searchResult: 'search' };

function send(type, payload) {
  const requestId = ++state.reqSeq;
  const ch = REQ_CHANNEL[type];
  if (ch) state.latest[ch] = requestId;
  state.worker.postMessage({ documentId: state.docId, requestId, type, payload });
  return requestId;
}
function onWorkerMessage(e) {
  const { documentId, requestId, type, payload } = e.data;
  if (documentId !== state.docId) return; // 古い原稿の結果は破棄
  const ch = RES_CHANNEL[type];
  if (ch && requestId !== state.latest[ch]) return; // 古い結果は破棄

  if (type === 'loaded') {
    state.text = payload.text;
    setProgress('');
    const encLabel = { 'utf-8': 'UTF-8', 'shift_jis': 'Shift_JIS', unknown: '不明' }[payload.encoding] || payload.encoding;
    const meta = `${state.fileName} ・ ${encLabel} ・ 改行 ${payload.newline} ・ ${state.text.length}字`;
    $('fileMeta').textContent = meta;
    $('fileMeta').title = meta;
    // 初回オープンのみ位置復元。自動／手動の「更新」再読込は keepOffsetOnLoad で現在位置を維持
    if (state.keepOffsetOnLoad) {
      state.keepOffsetOnLoad = false;
      state.pendingOffset = Math.max(0, Math.min(state.pendingOffset, state.text.length));
    } else {
      state.pendingOffset = loadPosition(state.fileName, state.text);
    }
    requestPaginate();
    requestWarnings();
    updateSearchIndicator();
  } else if (type === 'needEncoding') {
    setProgress('文字コードを判定できませんでした');
    $('fileMeta').textContent = `${state.fileName} ・ 文字コード判定不可`;
    $('fileMeta').title = $('fileMeta').textContent;
  } else if (type === 'paginated') {
    state.pages = payload.pages;
    state.pageIndex = clampPage(pageIndexOfOffset(state.pages, state.pendingOffset));
    buildThumbnails();
    populateFontSizes();
    renderCurrent();
    // ページ境界が変わると警告のページ番号も変わる
    if (state.warnings.length) renderWarnings(state.warnTotal);
    setProgress('');
  } else if (type === 'warnings') {
    state.warnings = payload.items;
    state.warnTotal = payload.total || payload.items.length;
    renderWarnings(state.warnTotal);
  } else if (type === 'searchResult') {
    state.matches = payload.matches;
    state.matchIndex = state.matches.length ? 0 : -1;
    $('searchCount').textContent = payload.total ? `${payload.total}件` : '0件';
    if (state.matchIndex >= 0) gotoOffset(state.matches[0].start);
    else renderCurrent();
  } else if (type === 'error') {
    setProgress('エラー: ' + payload.message);
  }
}

function currentConfig() {
  const s = state.settings;
  return { charsPerColumn: s.charsPerColumn, columnsPerPage: s.columnsPerPage, kinsoku: s.kinsoku, burasage: s.burasage };
}
function requestPaginate() {
  setProgress('ページ分割中…');
  send('paginate', { config: currentConfig() });
}
function requestWarnings() {
  send('detectWarnings', {
    showRuby: state.settings.showRuby,
    enabled: null,
    chapterMark: state.settings.chapterMark,
    episodeMark: state.settings.episodeMark,
  });
}

/* ---------------- File open / reload ---------------- */
/**
 * @param {File} file
 * @param {FileSystemFileHandle|null} handle
 * @param {{ keepPosition?: boolean }} [opts] keepPosition=true は更新再読込（位置維持）
 */
async function openFile(file, handle, opts = {}) {
  state.fileName = file.name || 'untitled.txt';
  state.fileHandle = handle || null;
  state.fileLastModified = file.lastModified || 0;
  state.keepOffsetOnLoad = !!opts.keepPosition;
  if (opts.keepPosition) {
    const page = state.pages[state.pageIndex];
    if (page) state.pendingOffset = page.range.start;
    // pages が空でも呼び出し側で pendingOffset 済みならそれを使う
  }
  updateReloadLabel();
  const buf = await file.arrayBuffer();
  state.docId++;
  setProgress('読み込み中…');
  send('load', { bytes: buf });
}

/**
 * 「更新」ボタン用。開く（別ファイル選択）ではない。
 * File System Access あり → ハンドルから再読込。
 * なし → ブラウザ制限でディスク再読ができないため、同じファイルの再選択を促す。
 */
async function reloadManuscript() {
  if (state.fileHandle) {
    try {
      const file = await state.fileHandle.getFile();
      const page = state.pages[state.pageIndex];
      if (page) state.pendingOffset = page.range.start;
      state.fileLastModified = file.lastModified || 0;
      await openFile(file, state.fileHandle, { keepPosition: true });
      showToast('更新された');
    } catch {
      showToast('再読込に失敗しました');
    }
    return;
  }
  // 未オープン
  if (!state.text && state.fileName === 'untitled.txt') {
    showToast('先に「開く」で原稿を選択してください');
    return;
  }
  // 自動更新不可環境: 同じファイルを選び直してディスク上の最新を読む
  state.expectReloadPick = true;
  showToast('同じファイルを選び直してください', 2000);
  $('fileInput').click();
}

/* ---------------- Rendering ---------------- */
function renderCurrent() {
  const pageEl = $('page');
  if (!state.pages.length) {
    pageEl.textContent = '';
    updateStatus();
    return;
  }
  const page = state.pages[state.pageIndex];
  pageEl.classList.toggle('grid', !!state.settings.gridLines);
  const highlights = [];
  if (state.matchIndex >= 0 && state.matches[state.matchIndex]) {
    highlights.push({ ...state.matches[state.matchIndex], kind: 'search' });
  }
  if (state._warnHighlight) {
    highlights.push({ ...state._warnHighlight, kind: 'warn' });
  }

  const fs = effectiveFontSize();
  pageEl.style.transform = 'none';
  applyFs(fs);
  renderPage(pageEl, state.text, page, {
    showRuby: state.settings.showRuby,
    halfColor: state.settings.halfColor,
    spaceColor: state.settings.spaceColor,
    highlights,
  });
  markHeadings(pageEl, page);
  buildRulers(pageEl, fs * 1.05);

  // 指定した行数・字数が必ず収まるよう、はみ出す分だけページ全体を等倍縮小する。
  // フォント計算の誤差に依存せず、全列が確実に表示される。
  const wrap = $('pageWrap');
  const availW = wrap.clientWidth - 44;
  const availH = wrap.clientHeight - 44;
  const ext = measureExtent(pageEl);
  let scale = 1;
  if (ext && ext.w > 0 && ext.h > 0) {
    scale = Math.min(1, availW / ext.w, availH / ext.h);
  }
  pageEl.style.transformOrigin = 'center center';
  pageEl.style.transform = scale < 0.999 ? `scale(${scale})` : 'none';

  updateStatus();
  persistPosition();
}

/** 表示に使う字級。auto 時はウィンドウに収まる最大、手動時は指定値（上限は maxFit） */
function effectiveFontSize() {
  const max = maxFitFontSize();
  if (state.settings.fontSizeAuto !== false) return max;
  return Math.max(8, Math.min(state.settings.fontSize || max, max));
}

// 全列の実描画範囲（幅・高さ）を測る。overflow で見切れても正しい寸法が取れる。
function measureExtent(pageEl) {
  const cols = pageEl.querySelectorAll('.col');
  if (!cols.length) return null;
  let l = Infinity, r = -Infinity, t = Infinity, b = -Infinity;
  cols.forEach((c) => {
    const q = c.getBoundingClientRect();
    l = Math.min(l, q.left); r = Math.max(r, q.right);
    t = Math.min(t, q.top); b = Math.max(b, q.bottom);
  });
  return { w: r - l, h: b - t };
}

// 字級と升目用CSS変数をまとめて適用
function applyFs(fs) {
  const root = document.documentElement.style;
  root.setProperty('--fs', fs + 'px');
  const cell = fs * 1.05;
  root.setProperty('--cell', cell.toFixed(2) + 'px');
  root.setProperty('--col-h', (cell * state.settings.charsPerColumn).toFixed(2) + 'px');
}

// 升目の目盛り: ページ外周に一列だけ（右=文字位置, 上=列位置）
function buildRulers(pageEl, cell) {
  pageEl.querySelectorAll('.ruler').forEach((n) => n.remove());
  if (!state.settings.gridLines) return;
  const cols = pageEl.querySelectorAll('.col');
  if (!cols.length) return;
  const colW = cols[0].getBoundingClientRect().width;
  const chars = state.settings.charsPerColumn;
  const ncols = state.settings.columnsPerPage;

  const right = document.createElement('div');
  right.className = 'ruler ruler-right';
  for (let k = 5; k <= chars; k += 5) {
    const s = document.createElement('span');
    s.textContent = String(k);
    s.style.top = (k * cell - cell / 2) + 'px'; // 半文字上
    right.appendChild(s);
  }
  pageEl.appendChild(right);

  const top = document.createElement('div');
  top.className = 'ruler ruler-top';
  // 縦書きの「行」= 列。右端が1行目。数字は各行のセンターに置く
  for (let k = 5; k <= ncols; k += 5) {
    const s = document.createElement('span');
    s.textContent = String(k);
    s.style.right = ((k - 0.5) * colW) + 'px';
    top.appendChild(s);
  }
  pageEl.appendChild(top);
}

function markHeadings(pageEl, page) {
  // 見出し行（LF行）: 行頭〜マーカー前が半角/全角スペースのみなら色クラス。
  // 改行で本文に戻る。
  const marks = resolveHeadingMarks(state.settings);
  const cols = pageEl.querySelectorAll('.col');
  page.columns.forEach((c, i) => {
    if (!cols[i]) return;
    const line = lineTextAt(state.text, c.start);
    const lv = headingLevel(line, marks);
    if (lv === 2) cols[i].classList.add('heading-2');
    else if (lv === 1) cols[i].classList.add('heading-1');
  });
}

/** offset を含む LF 行の本文（改行を含まない） */
function lineTextAt(text, offset) {
  const o = Math.max(0, Math.min(offset, text.length));
  const start = o === 0 ? 0 : text.lastIndexOf('\n', o - 1) + 1;
  let end = text.indexOf('\n', o);
  if (end < 0) end = text.length;
  // 列先頭が改行直後で o が次行のときも start は正しい。列が改行を含む場合は start 側の行を見る
  return text.slice(start, end);
}

// 1文字ぶんの実寸をプローブ測定し、指定の字数×行数が収まる最大字級を理論計算する。
// 推定係数に頼らないので、指定した行数が必ず表示される。
const FONT_SIZE_MAX_CAP = 120;
function maxFitFontSize() {
  const wrap = $('pageWrap');
  const availH = Math.max(40, wrap.clientHeight - 44);
  const availW = Math.max(40, wrap.clientWidth - 44);
  const s = state.settings;
  const PROBE_FS = 100;

  const probe = document.createElement('div');
  probe.className = 'col';
  probe.style.cssText = 'font-size:100px;visibility:hidden;position:absolute;left:-99999px;top:0;';
  probe.textContent = 'あ'.repeat(Math.max(1, s.charsPerColumn));
  wrap.appendChild(probe);
  const rect = probe.getBoundingClientRect();
  wrap.removeChild(probe);

  const colH100 = rect.height;   // charsPerColumn 文字ぶんの列の長さ（fs=100）
  const colW100 = rect.width;    // 1列の幅（fs=100）
  if (!colH100 || !colW100) return s.fontSize || 20;

  // #page は flex の gap（columnGap ではない）
  const pageCs = getComputedStyle($('page'));
  const gap = parseFloat(pageCs.gap || pageCs.columnGap) || 0;
  const fsByH = (availH * PROBE_FS) / colH100;
  const fsByW = ((availW - (s.columnsPerPage - 1) * gap) * PROBE_FS) / (s.columnsPerPage * colW100);
  // 余白を少し見て安全側へ（はみ出し scale に頼る前にほぼ最大）
  const fit = Math.floor(Math.min(fsByH, fsByW) * 0.98);
  return Math.max(8, Math.min(FONT_SIZE_MAX_CAP, fit));
}

// 字級セレクトを「表示可能なサイズ」だけで再構築する。
// auto 時は常に最大を選び、ウィンドウ拡大に追随する。
function populateFontSizes() {
  const sel = $('fontSize');
  const max = maxFitFontSize();
  let cur;
  if (state.settings.fontSizeAuto !== false) {
    cur = max;
    state.settings.fontSizeAuto = true;
  } else {
    cur = Math.min(state.settings.fontSize || max, max);
    if (cur < 8) cur = 8;
    // 手動指定が実質最大と同じなら auto に戻して拡大に追随
    if (cur >= max) {
      cur = max;
      state.settings.fontSizeAuto = true;
    }
  }
  state.settings.fontSize = cur;

  const sizes = [];
  const step = max > 48 ? 4 : 2;
  for (let v = 8; v <= max; v += step) sizes.push(v);
  if (!sizes.includes(cur)) sizes.push(cur);
  if (!sizes.includes(max)) sizes.push(max);
  sizes.sort((a, b) => a - b);
  sel.innerHTML = '';
  for (const v of sizes) {
    const o = document.createElement('option');
    o.value = String(v);
    o.textContent = v === max ? `${v}px（最大）` : `${v}px`;
    sel.appendChild(o);
  }
  sel.value = String(cur);
}

/* ---------------- Thumbnails ---------------- */
let scrubbing = false;
function buildThumbnails() {
  const box = $('thumbs');
  box.innerHTML = '';
  if (!state.pages.length) return;
  state.pages.forEach((p, i) => {
    const t = document.createElement('div');
    t.className = 'thumb';
    t.dataset.i = String(i);
    const num = document.createElement('span');
    num.className = 'tnum';
    num.textContent = String(i + 1);
    t.appendChild(num);
    // 1ページ内の章・話タイトルはすべて並べる
    for (const hd of headingsInPage(p)) {
      const h = document.createElement('span');
      h.className = hd.level === 2 ? 'thead h2' : 'thead';
      h.textContent = hd.text;
      t.appendChild(h);
    }
    t.addEventListener('mousedown', (e) => { e.preventDefault(); scrubbing = true; gotoPage(i); });
    t.addEventListener('mouseenter', () => { if (scrubbing) gotoPage(i); });
    box.appendChild(t);
  });
  updateThumbActive();
}

/** ページ範囲内の見出しを出現順ですべて返す（タイトルは長すぎると切る） */
function headingsInPage(p) {
  const marks = resolveHeadingMarks(state.settings);
  const seg = state.text.slice(p.range.start, p.range.end);
  const out = [];
  for (const line of seg.split('\n')) {
    const hd = headingTitle(line, marks, 24);
    if (hd) out.push(hd);
  }
  return out;
}
function updateThumbActive() {
  const box = $('thumbs');
  const cur = box.querySelector('.thumb.active');
  if (cur) cur.classList.remove('active');
  const el = box.children[state.pageIndex];
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }
}

function updateStatus() {
  const total = state.pages.length;
  const cur = total ? state.pageIndex + 1 : 0;
  const page = state.pages[state.pageIndex];
  const chars = page ? page.range.end - page.range.start : 0;
  $('totalPages').textContent = String(total);
  $('pageChars').textContent = String(chars);
  $('totalChars').textContent = String(state.text.length);
  const jump = $('jumpInput');
  jump.max = String(total);
  if (document.activeElement !== jump) jump.value = String(cur);
  updateThumbActive();
}

function setProgress(msg) {
  $('progress').textContent = msg;
}

// File System Access のハンドルがあれば自動更新監視が有効 →「自動更新」表示のみ。
// 不可なら「更新」ボタン（手動再読込。開くではない）を表示。
function updateReloadLabel() {
  const btn = $('reloadBtn');
  const badge = $('autoLabel');
  if (state.fileHandle) {
    btn.hidden = true;
    badge.hidden = false;
  } else {
    btn.hidden = false;
    badge.hidden = true;
  }
}

/* ---------------- Navigation ---------------- */
function clampPage(i) {
  return Math.max(0, Math.min(state.pages.length - 1, i));
}
/** 再ページ分割後も今見ている位置を維持するため pendingOffset を同期する */
function syncPendingFromPage() {
  const page = state.pages[state.pageIndex];
  if (page) state.pendingOffset = page.range.start;
}
function go(delta) {
  const ni = clampPage(state.pageIndex + delta);
  if (ni !== state.pageIndex) {
    state.pageIndex = ni;
    syncPendingFromPage();
    renderCurrent();
  }
}
function gotoPage(i) {
  state.pageIndex = clampPage(i);
  syncPendingFromPage();
  renderCurrent();
}
function gotoOffset(offset) {
  if (!state.pages.length) return;
  state.pendingOffset = Math.max(0, Math.min(offset, state.text.length));
  state.pageIndex = clampPage(pageIndexOfOffset(state.pages, state.pendingOffset));
  renderCurrent();
}
function onKey(e) {
  // 文字入力中はページ送りしない（checkbox/button 上の Space はページ送りにする）
  const el = e.target;
  const tag = el && el.tagName;
  if (tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (tag === 'INPUT') {
    const ty = (el.type || 'text').toLowerCase();
    if (ty === 'text' || ty === 'search' || ty === 'number' || ty === 'password' || ty === '') return;
  }

  // 縦書きは右→左。ArrowLeft で次ページ、ArrowRight で前ページが自然。
  if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') { go(1); e.preventDefault(); }
  else if (e.key === 'ArrowRight' || e.key === 'ArrowUp') { go(-1); e.preventDefault(); }
  else if (e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar') {
    // Space=次、Shift+Space=前
    go(e.shiftKey ? -1 : 1);
    e.preventDefault();
  }
}
let wheelAccum = 0;
function onWheel(e) {
  e.preventDefault();
  wheelAccum += e.deltaY;
  if (Math.abs(wheelAccum) > 60) {
    go(wheelAccum > 0 ? 1 : -1);
    wheelAccum = 0;
  }
}
function installSwipe(el) {
  let x0 = null;
  el.addEventListener('touchstart', (e) => { x0 = e.touches[0].clientX; }, { passive: true });
  el.addEventListener('touchend', (e) => {
    if (x0 === null) return;
    const dx = e.changedTouches[0].clientX - x0;
    // 右綴じ（縦書き）: 右スワイプ=次・左スワイプ=前（指の動きがページをめくる方向）
    if (Math.abs(dx) > 40) go(dx > 0 ? 1 : -1);
    x0 = null;
  });
}

/* ---------------- Warnings panel ---------------- */
function renderWarnings(total) {
  const list = $('warnList');
  list.textContent = '';
  const shown = total != null ? total : state.warnTotal;
  $('warnTotal').textContent = shown ? `${shown}件` : '0件';
  state.warnings.forEach((w, idx) => {
    const li = document.createElement('li');
    li.className = 'warn-item sev-' + w.severity;
    li.dataset.idx = String(idx);
    fillWarningItemContent(li, w);
    li.title = w.severity + ' / ' + (w.label || w.code);
    if (idx === state.warnIndex) li.classList.add('active');
    li.addEventListener('click', () => jumpWarning(idx));
    list.appendChild(li);
  });
  syncWarnListActive();
}
/**
 * 一覧項目の表示を組み立てる。
 * 字下げ漏れは頻出のため「位置＋種別」と「行頭」を2行に分ける。
 */
function fillWarningItemContent(li, w) {
  const off = w.range && typeof w.range.start === 'number' ? w.range.start : 0;
  const loc = locateOnPages(off);
  const prefix = loc ? `p${loc.page} ${loc.line}行` : 'p– –行';
  const base = w.label || w.code || '';

  // 字下げ漏れ　行頭… → 2行表示
  if (w.code === 'indent-missing') {
    const headSep = '字下げ漏れ';
    let head = '';
    if (base.startsWith(headSep)) {
      head = base.slice(headSep.length).replace(/^　+/, '');
    }
    const line1 = document.createElement('div');
    line1.className = 'warn-line1';
    line1.textContent = `${prefix}　${headSep}`;
    li.appendChild(line1);
    if (head) {
      const line2 = document.createElement('div');
      line2.className = 'warn-line2';
      line2.textContent = head;
      li.appendChild(line2);
    }
    return;
  }

  li.textContent = `${prefix}　${base}`;
}
/**
 * オフセットが属する表示ページ番号（1始まり）と、
 * そのページ内の原稿用紙の行番号（1始まり＝縦書きの列番号）。
 * @param {number} offset
 * @returns {{page:number, line:number}|null}
 */
function locateOnPages(offset) {
  if (!state.pages || !state.pages.length) return null;
  const pi = pageIndexOfOffset(state.pages, offset);
  const page = state.pages[pi];
  if (!page) return null;
  const cols = page.columns || [];
  let line = 1;
  if (cols.length) {
    // 半開区間 [start,end)。end ちょうどは次列だが、最終列 end は最終行に含める
    let found = -1;
    for (let i = 0; i < cols.length; i++) {
      const c = cols[i];
      const last = i === cols.length - 1;
      if (offset >= c.start && (offset < c.end || (last && offset <= c.end))) {
        found = i;
        break;
      }
    }
    // 列の隙間や境界ずれのときは最も近い列
    if (found < 0) {
      found = 0;
      for (let i = 0; i < cols.length; i++) {
        if (offset >= cols[i].start) found = i;
      }
    }
    line = found + 1;
  }
  return { page: pi + 1, line };
}
function jumpWarning(idx) {
  const w = state.warnings[idx];
  if (!w) return;
  state.warnIndex = idx;
  state._warnHighlight = w.range;
  syncWarnListActive();
  gotoOffset(w.range.start);
}
/** 校正の前/次。端では止まってループしない。先頭で「前」ならハイライト解除して1ページ目。 */
function stepWarning(delta) {
  if (!state.warnings.length) return;
  if (state.warnIndex < 0) {
    // 未選択: 「次」だけ先頭へ。「前」はループせず何もしない（または1ページ目）
    if (delta < 0) {
      clearWarningJump();
      gotoPage(0);
      return;
    }
    jumpWarning(0);
    return;
  }
  const ni = state.warnIndex + delta;
  if (ni < 0) {
    clearWarningJump();
    gotoPage(0);
    return;
  }
  if (ni >= state.warnings.length) return; // 末尾で次 → 止まってループしない
  jumpWarning(ni);
}
function clearWarningJump() {
  state.warnIndex = -1;
  state._warnHighlight = null;
  syncWarnListActive();
}
/** 一覧の選択行に本文と同じ黄＋枠を付け、見える位置へスクロール */
function syncWarnListActive() {
  const list = $('warnList');
  if (!list) return;
  let activeEl = null;
  list.querySelectorAll('.warn-item').forEach((li) => {
    const on = Number(li.dataset.idx) === state.warnIndex;
    li.classList.toggle('active', on);
    if (on) activeEl = li;
  });
  if (activeEl && typeof activeEl.scrollIntoView === 'function') {
    activeEl.scrollIntoView({ block: 'nearest' });
  }
}

/* ---------------- Search ---------------- */
function doSearch() {
  const q = $('searchInput').value;
  if (!q) { state.matches = []; state.matchIndex = -1; $('searchCount').textContent = ''; renderCurrent(); return; }
  send('search', {
    query: q,
    headingOnly: false,
    chapterMark: state.settings.chapterMark,
    episodeMark: state.settings.episodeMark,
  });
}
function stepMatch(delta) {
  if (!state.matches.length) return;
  state.matchIndex = (state.matchIndex + delta + state.matches.length) % state.matches.length;
  gotoOffset(state.matches[state.matchIndex].start);
}
function updateSearchIndicator() {
  $('searchCount').textContent = '';
}

/* ---------------- Copy normalization（親文字のみ） ---------------- */
function installCopyHandler() {
  document.addEventListener('copy', (e) => {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount || sel.isCollapsed) return;
    const frag = sel.getRangeAt(0).cloneContents();
    frag.querySelectorAll('rt, rp').forEach((n) => n.remove());
    if (e.clipboardData) {
      e.clipboardData.setData('text/plain', frag.textContent);
      e.preventDefault();
    }
  });
}

/* ---------------- Position persist ---------------- */
function persistPosition() {
  const page = state.pages[state.pageIndex];
  if (page) savePosition(state.fileName, state.text, page.range.start);
}

/* ---------------- File watch (File System Access API) ---------------- */
function startFileWatch() {
  const check = async () => {
    if (!state.fileHandle) return;
    try {
      const file = await state.fileHandle.getFile();
      if (file.lastModified !== state.fileLastModified) {
        const keepOffset = state.pages[state.pageIndex] ? state.pages[state.pageIndex].range.start : state.pendingOffset;
        state.fileLastModified = file.lastModified;
        state.pendingOffset = keepOffset;
        await openFile(file, state.fileHandle, { keepPosition: true });
        showToast('更新された');
      }
    } catch { /* 権限切れ等は無視 */ }
  };
  setInterval(check, 3000);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) check(); });
}

/* ---------------- UI wiring ---------------- */
function buildPresetOptions() {
  const sel = $('presetSelect');
  PRESETS.forEach((p, i) => {
    const o = document.createElement('option');
    o.value = String(i);
    o.textContent = p.name;
    sel.appendChild(o);
  });
  const custom = document.createElement('option');
  custom.value = 'custom';
  custom.textContent = 'カスタム';
  sel.appendChild(custom);
}
function reflectSettingsToUI() {
  const s = state.settings;
  $('presetSelect').value = s.presetIndex >= 0 ? String(s.presetIndex) : 'custom';
  $('cpc').value = s.charsPerColumn;
  $('cpp').value = s.columnsPerPage;
  $('kinsoku').checked = s.kinsoku;
  $('burasage').checked = s.burasage;
  $('showRuby').checked = s.showRuby;
  $('halfColor').checked = s.halfColor;
  $('spaceColor').checked = s.spaceColor;
  $('gridLines').checked = s.gridLines;
  $('themeSelect').value = s.theme;
  $('fontSelect').value = s.fontFamily;
  $('fontSize').value = s.fontSize;
  $('burasage').disabled = !s.kinsoku;
  $('chapterMark').value = s.chapterMark != null ? s.chapterMark : '#';
  $('episodeMark').value = s.episodeMark != null ? s.episodeMark : '##';
}
function applyAppearance() {
  const s = state.settings;
  document.documentElement.dataset.theme = s.theme;
  document.documentElement.dataset.font = s.fontFamily;
}
function persist() { saveSettings(state.settings); }

function bindUI() {
  $('fileInput').addEventListener('change', (e) => {
    const f = e.target.files[0];
    const reloadPick = state.expectReloadPick;
    state.expectReloadPick = false;
    // キャンセルや空選択で change が来ないこともある。来たら input を空にして同じファイル再選択を可能に
    e.target.value = '';
    if (f) openFile(f, null, { keepPosition: reloadPick });
  });
  $('openFsBtn').addEventListener('click', async () => {
    state.expectReloadPick = false; // 「開く」は初回扱い
    if (!window.showOpenFilePicker) { $('fileInput').click(); return; }
    try {
      const [handle] = await window.showOpenFilePicker({ types: [{ description: 'Text', accept: { 'text/plain': ['.txt'] } }] });
      const file = await handle.getFile();
      openFile(file, handle, { keepPosition: false });
    } catch { /* キャンセル */ }
  });
  // 「更新」＝自動更新できないときの手動再読込（ファイルオープンUIの代替ではない）
  $('reloadBtn').addEventListener('click', () => { reloadManuscript(); });

  $('presetSelect').addEventListener('change', (e) => {
    const v = e.target.value;
    if (v === 'custom') { state.settings.presetIndex = -1; }
    else {
      const p = PRESETS[+v];
      state.settings.presetIndex = +v;
      state.settings.charsPerColumn = p.charsPerColumn;
      state.settings.columnsPerPage = p.columnsPerPage;
    }
    reflectSettingsToUI(); persist(); if (state.text) requestPaginate();
  });
  const onCustom = () => {
    state.settings.presetIndex = -1;
    state.settings.charsPerColumn = clampInt($('cpc').value, 1, 60, 40);
    state.settings.columnsPerPage = clampInt($('cpp').value, 1, 60, 18);
    $('presetSelect').value = 'custom';
    persist(); if (state.text) requestPaginate();
  };
  $('cpc').addEventListener('change', onCustom);
  $('cpp').addEventListener('change', onCustom);

  $('kinsoku').addEventListener('change', (e) => {
    state.settings.kinsoku = e.target.checked;
    $('burasage').disabled = !e.target.checked;
    persist(); if (state.text) requestPaginate();
  });
  $('burasage').addEventListener('change', (e) => {
    state.settings.burasage = e.target.checked; persist(); if (state.text) requestPaginate();
  });
  // ルビ表示: 再ページ分割しない。再描画＋ワーニング再検出のみ。
  $('showRuby').addEventListener('change', (e) => {
    state.settings.showRuby = e.target.checked; persist(); renderCurrent(); if (state.text) requestWarnings();
  });
  $('halfColor').addEventListener('change', (e) => {
    state.settings.halfColor = e.target.checked; persist(); renderCurrent();
  });
  $('spaceColor').addEventListener('change', (e) => {
    state.settings.spaceColor = e.target.checked; persist(); renderCurrent();
  });
  $('gridLines').addEventListener('change', (e) => {
    state.settings.gridLines = e.target.checked; persist(); renderCurrent();
  });
  $('themeSelect').addEventListener('change', (e) => {
    state.settings.theme = e.target.value; applyAppearance(); persist();
  });
  $('fontSelect').addEventListener('change', (e) => {
    state.settings.fontFamily = e.target.value; applyAppearance(); persist(); renderCurrent();
  });
  $('fontSize').addEventListener('change', (e) => {
    const max = maxFitFontSize();
    const v = clampInt(e.target.value, 8, FONT_SIZE_MAX_CAP, max);
    state.settings.fontSize = v;
    // 最大を選んだら auto（ウィンドウ拡大に追随）。それ以外は固定。
    state.settings.fontSizeAuto = v >= max;
    persist();
    populateFontSizes();
    renderCurrent();
  });

  $('prevBtn').addEventListener('click', () => go(-1));
  $('nextBtn').addEventListener('click', () => go(1));
  $('jumpInput').addEventListener('change', (e) => gotoPage((+e.target.value || 1) - 1));

  $('searchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
  $('searchBtn').addEventListener('click', doSearch);
  $('searchPrev').addEventListener('click', () => stepMatch(-1));
  $('searchNext').addEventListener('click', () => stepMatch(1));

  $('warnPrev').addEventListener('click', () => stepWarning(-1));
  $('warnNext').addEventListener('click', () => stepWarning(1));

  $('togglePanel').addEventListener('click', () => document.body.classList.toggle('panel-open'));

  const onHeadingMarkChange = () => {
    let chapter = String($('chapterMark').value ?? '');
    let episode = String($('episodeMark').value ?? '');
    // 空欄は既定に戻す
    if (!chapter) chapter = '#';
    if (!episode) episode = '##';
    state.settings.chapterMark = chapter;
    state.settings.episodeMark = episode;
    $('chapterMark').value = chapter;
    $('episodeMark').value = episode;
    persist();
    renderCurrent();
    if (state.pages.length) buildThumbnails();
    if (state.text) requestWarnings();
  };
  $('chapterMark').addEventListener('change', onHeadingMarkChange);
  $('episodeMark').addEventListener('change', onHeadingMarkChange);
}

function clampInt(v, lo, hi, def) {
  const n = parseInt(v, 10);
  if (Number.isNaN(n)) return def;
  return Math.max(lo, Math.min(hi, n));
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();

</script>
</body>
</html>
